<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2a2a"/>
      <stop offset="100%" stop-color="#041515"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f2f2f"/>
      <stop offset="100%" stop-color="#071a1a"/>
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Сетка-оверлей -->
  <g stroke="#0d9488" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="420" x2="800" y2="420"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="0" y1="540" x2="800" y2="540"/>
    <line x1="80" y1="0" x2="80" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="600"/>
    <line x1="240" y1="0" x2="240" y2="600"/>
    <line x1="320" y1="0" x2="320" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/>
    <line x1="560" y1="0" x2="560" y2="600"/>
    <line x1="640" y1="0" x2="640" y2="600"/>
    <line x1="720" y1="0" x2="720" y2="600"/>
  </g>

  <!-- CSV-таблица (слева) -->
  <rect x="60" y="120" width="280" height="200" rx="8" fill="url(#blockGrad)" stroke="#0d9488" stroke-width="1.5" opacity="0.9"/>
  <!-- Заголовок таблицы -->
  <rect x="60" y="120" width="280" height="36" rx="8" fill="#0d9488" opacity="0.2"/>
  <rect x="60" y="144" width="280" height="12" fill="#0d9488" opacity="0.2"/>
  <text x="200" y="143" font-family="monospace" font-size="11" fill="#0d9488" text-anchor="middle" opacity="0.9">input.csv</text>
  <!-- Строки таблицы -->
  <text x="80" y="175" font-family="monospace" font-size="10" fill="#5eead4" opacity="0.7">TRW  GDB265M</text>
  <text x="80" y="193" font-family="monospace" font-size="10" fill="#5eead4" opacity="0.7">TRW  GDB1330</text>
  <text x="80" y="211" font-family="monospace" font-size="10" fill="#5eead4" opacity="0.7">TRW  GDB3332</text>
  <text x="80" y="229" font-family="monospace" font-size="10" fill="#5eead4" opacity="0.7">TRW  GDB1384</text>
  <text x="80" y="247" font-family="monospace" font-size="10" fill="#5eead4" opacity="0.7">TRW  GDB1807</text>
  <text x="80" y="265" font-family="monospace" font-size="10" fill="#5eead4" opacity="0.6">TRW  GDB3429</text>
  <text x="80" y="283" font-family="monospace" font-size="10" fill="#5eead4" opacity="0.4">...</text>
  <!-- Иконка файла -->
  <text x="316" y="143" font-family="monospace" font-size="12" fill="#0d9488" opacity="0.7">⬛</text>

  <!-- Стрелка CSV → парсер -->
  <line x1="340" y1="220" x2="390" y2="220" stroke="#0d9488" stroke-width="2" opacity="0.7"/>
  <polygon points="390,215 402,220 390,225" fill="#0d9488" opacity="0.7"/>

  <!-- Центральный блок парсера -->
  <rect x="402" y="148" width="160" height="144" rx="10" fill="#071f1f" stroke="#0d9488" stroke-width="2" opacity="0.95"/>
  <text x="482" y="177" font-family="monospace" font-size="13" fill="#0d9488" text-anchor="middle" font-weight="bold">parcer.exe</text>
  <line x1="420" y1="185" x2="544" y2="185" stroke="#0d9488" stroke-width="0.8" opacity="0.3"/>
  <text x="482" y="204" font-family="monospace" font-size="9" fill="#5eead4" text-anchor="middle" opacity="0.7">requests</text>
  <text x="482" y="220" font-family="monospace" font-size="9" fill="#5eead4" text-anchor="middle" opacity="0.7">proxy rotation</text>
  <text x="482" y="236" font-family="monospace" font-size="9" fill="#5eead4" text-anchor="middle" opacity="0.7">random delay</text>
  <text x="482" y="256" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle" opacity="0.6">Python → .exe</text>
  <text x="482" y="274" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle" opacity="0.6">config.json</text>

  <!-- Стрелка парсер → output -->
  <line x1="562" y1="220" x2="612" y2="220" stroke="#0d9488" stroke-width="2" opacity="0.7"/>
  <polygon points="612,215 624,220 612,225" fill="#0d9488" opacity="0.7"/>

  <!-- Блок output.csv -->
  <rect x="624" y="168" width="116" height="104" rx="8" fill="url(#blockGrad)" stroke="#0d9488" stroke-width="1.5" opacity="0.9"/>
  <text x="682" y="193" font-family="monospace" font-size="10" fill="#0d9488" text-anchor="middle" opacity="0.9">output.csv</text>
  <line x1="638" y1="200" x2="726" y2="200" stroke="#0d9488" stroke-width="0.8" opacity="0.3"/>
  <text x="682" y="218" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle" opacity="0.8">✓ наличие</text>
  <text x="682" y="234" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle" opacity="0.8">✓ изображение</text>
  <text x="682" y="250" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle" opacity="0.8">✓ цена</text>

  <!-- Блок прокси (снизу) -->
  <rect x="402" y="330" width="160" height="60" rx="8" fill="#071f1f" stroke="#0d9488" stroke-width="1" opacity="0.7"/>
  <text x="482" y="356" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle" opacity="0.7">proxies.csv</text>
  <text x="482" y="374" font-family="monospace" font-size="9" fill="#5eead4" text-anchor="middle" opacity="0.6">7 proxy servers</text>
  <!-- Стрелка proxies → parser -->
  <line x1="482" y1="330" x2="482" y2="296" stroke="#0d9488" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="477,296 482,284 487,296" fill="#0d9488" opacity="0.5"/>

  <!-- Частицы -->
  <circle cx="150" cy="80" r="3" fill="#0d9488" opacity="0.25"/>
  <circle cx="530" cy="90" r="5" fill="#0d9488" opacity="0.2"/>
  <circle cx="700" cy="70" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="350" cy="480" r="6" fill="#0d9488" opacity="0.15"/>
  <circle cx="90" cy="420" r="3" fill="#0d9488" opacity="0.2"/>
  <circle cx="760" cy="400" r="4" fill="#0d9488" opacity="0.18"/>

  <!-- Заголовок -->
  <text x="400" y="75" font-family="'Inter', sans-serif" font-size="26" fill="#e2e8f0" text-anchor="middle" font-weight="700" opacity="0.95">Парсер автозапчастей</text>
  <text x="400" y="100" font-family="'Inter', sans-serif" font-size="13" fill="#0d9488" text-anchor="middle" opacity="0.8">4garage.ru · Python · CSV</text>

  <!-- Декоративный акцент снизу -->
  <line x1="200" y1="460" x2="600" y2="460" stroke="#0d9488" stroke-width="1" opacity="0.2"/>
  <text x="400" y="490" font-family="monospace" font-size="11" fill="#5eead4" text-anchor="middle" opacity="0.5">100+ позиций · ротация прокси · random delay 20–60 сек</text>
  <text x="400" y="512" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle" opacity="0.4">запускается без установки Python</text>

  <!-- Угловые декоративные элементы -->
  <rect x="40" y="40" width="20" height="2" fill="#0d9488" opacity="0.4"/>
  <rect x="40" y="40" width="2" height="20" fill="#0d9488" opacity="0.4"/>
  <rect x="740" y="40" width="20" height="2" fill="#0d9488" opacity="0.4"/>
  <rect x="758" y="40" width="2" height="20" fill="#0d9488" opacity="0.4"/>
  <rect x="40" y="558" width="20" height="2" fill="#0d9488" opacity="0.4"/>
  <rect x="40" y="540" width="2" height="20" fill="#0d9488" opacity="0.4"/>
  <rect x="740" y="558" width="20" height="2" fill="#0d9488" opacity="0.4"/>
  <rect x="758" y="540" width="2" height="20" fill="#0d9488" opacity="0.4"/>
</svg>
