<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" style="background:#0d0d1a; font-family: 'Inter', sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" opacity="0.7"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" opacity="0.7"/>
    </marker>
  </defs>

  <!-- SDK / Events -->
  <rect x="20" y="170" width="130" height="80" rx="8" fill="#1a1200" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="85" y="205" text-anchor="middle" fill="#e2e8f0" font-size="12">SDK Events</text>
  <text x="85" y="223" text-anchor="middle" fill="#f59e0b" font-size="10">500+ RPS</text>

  <line x1="150" y1="210" x2="200" y2="210" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)" opacity="0.7"/>

  <!-- Ingest Service -->
  <rect x="200" y="155" width="150" height="110" rx="8" fill="#1a1200" stroke="#f59e0b" stroke-width="2"/>
  <text x="275" y="197" text-anchor="middle" fill="#e2e8f0" font-size="13">Ingest API</text>
  <text x="275" y="215" text-anchor="middle" fill="#94a3b8" font-size="10">FastAPI</text>
  <text x="275" y="233" text-anchor="middle" fill="#94a3b8" font-size="10">Batch write</text>
  <text x="275" y="251" text-anchor="middle" fill="#f59e0b" font-size="10">High-throughput</text>

  <line x1="350" y1="210" x2="400" y2="210" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- Redis Buffer -->
  <rect x="400" y="175" width="130" height="70" rx="8" fill="#1a1200" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="465" y="208" text-anchor="middle" fill="#e2e8f0" font-size="13">Redis</text>
  <text x="465" y="226" text-anchor="middle" fill="#f59e0b" font-size="10">Batch Buffer</text>

  <line x1="530" y1="210" x2="580" y2="210" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- Celery Workers -->
  <rect x="580" y="155" width="150" height="110" rx="8" fill="#1a1200" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="655" y="197" text-anchor="middle" fill="#e2e8f0" font-size="13">Celery Workers</text>
  <text x="655" y="215" text-anchor="middle" fill="#94a3b8" font-size="10">Aggregation</text>
  <text x="655" y="233" text-anchor="middle" fill="#94a3b8" font-size="10">Materialized Views</text>
  <text x="655" y="251" text-anchor="middle" fill="#f59e0b" font-size="10">Scheduled tasks</text>

  <line x1="730" y1="210" x2="780" y2="210" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- PostgreSQL -->
  <rect x="780" y="165" width="140" height="90" rx="8" fill="#1a1200" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="850" y="205" text-anchor="middle" fill="#e2e8f0" font-size="13">PostgreSQL</text>
  <text x="850" y="223" text-anchor="middle" fill="#94a3b8" font-size="10">Materialized</text>
  <text x="850" y="241" text-anchor="middle" fill="#f59e0b" font-size="10">2M+ events/day</text>

  <!-- Query API (bottom) -->
  <line x1="850" y1="255" x2="850" y2="310" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr2)" opacity="0.6"/>
  <rect x="750" y="310" width="200" height="80" rx="8" fill="#0a1020" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="850" y="348" text-anchor="middle" fill="#e2e8f0" font-size="13">Query API</text>
  <text x="850" y="368" text-anchor="middle" fill="#22d3ee" font-size="10">Dashboard REST API</text>
  <text x="850" y="384" text-anchor="middle" fill="#94a3b8" font-size="10">Redis cache layer</text>

  <!-- Dashboard clients -->
  <line x1="750" y1="350" x2="700" y2="350" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr2)" opacity="0.5"/>
  <rect x="560" y="310" width="140" height="80" rx="8" fill="#0a1020" stroke="#22d3ee" stroke-width="1" opacity="0.8"/>
  <text x="630" y="348" text-anchor="middle" fill="#94a3b8" font-size="12">Dashboard</text>
  <text x="630" y="368" text-anchor="middle" fill="#22d3ee" font-size="10">Frontend</text>
</svg>
