<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1000"/>
      <stop offset="100%" stop-color="#0c0900"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#f59e0b" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="75" x2="800" y2="75"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/><line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- Metric cards top -->
  <rect x="60" y="80" width="150" height="80" rx="10" fill="#1a1200" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
  <text x="135" y="116" text-anchor="middle" fill="#f59e0b" font-size="22" font-weight="bold" font-family="sans-serif">2M+</text>
  <text x="135" y="140" text-anchor="middle" fill="#78716c" font-size="11" font-family="sans-serif">событий в сутки</text>
  <rect x="230" y="80" width="150" height="80" rx="10" fill="#0a1a10" stroke="#10b981" stroke-width="1" opacity="0.9"/>
  <text x="305" y="116" text-anchor="middle" fill="#10b981" font-size="22" font-weight="bold" font-family="sans-serif">3 сек</text>
  <text x="305" y="140" text-anchor="middle" fill="#78716c" font-size="11" font-family="sans-serif">любой отчёт</text>
  <rect x="400" y="80" width="150" height="80" rx="10" fill="#0a1020" stroke="#22d3ee" stroke-width="1" opacity="0.9"/>
  <text x="475" y="116" text-anchor="middle" fill="#22d3ee" font-size="22" font-weight="bold" font-family="sans-serif">500+</text>
  <text x="475" y="140" text-anchor="middle" fill="#78716c" font-size="11" font-family="sans-serif">RPS throughput</text>
  <!-- Bar chart -->
  <rect x="60" y="420" width="500" height="100" rx="10" fill="#1a1200" stroke="#f59e0b" stroke-width="0.5" opacity="0.5"/>
  <!-- Bars -->
  <rect x="100" y="430" width="40" height="80" rx="4" fill="url(#bar1)" opacity="0.8"/>
  <rect x="155" y="455" width="40" height="55" rx="4" fill="url(#bar1)" opacity="0.7"/>
  <rect x="210" y="440" width="40" height="70" rx="4" fill="url(#bar1)" opacity="0.8"/>
  <rect x="265" y="435" width="40" height="75" rx="4" fill="url(#bar2)" opacity="0.8"/>
  <rect x="320" y="445" width="40" height="65" rx="4" fill="url(#bar2)" opacity="0.7"/>
  <rect x="375" y="430" width="40" height="80" rx="4" fill="url(#bar2)" opacity="0.85"/>
  <rect x="430" y="450" width="40" height="60" rx="4" fill="url(#bar1)" opacity="0.7"/>
  <!-- Line chart -->
  <polyline points="580,200 620,180 660,220 700,160 740,190" stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="580,240 620,260 660,230 700,250 740,220" stroke="#22d3ee" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0"/>
  <circle cx="740" cy="190" r="5" fill="#f59e0b"/>
  <circle cx="740" cy="220" r="5" fill="#22d3ee"/>
  <!-- Particles -->
  <circle cx="700" cy="480" r="3" fill="#f59e0b" opacity="0.3"/>
  <circle cx="740" cy="400" r="2" fill="#f59e0b" opacity="0.25"/>
</svg>
