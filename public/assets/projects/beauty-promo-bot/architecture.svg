<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420"
     style="background:#0d0d1a; font-family: 'Inter', sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" opacity="0.7"/>
    </marker>
    <marker id="arr-dashed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" opacity="0.5"/>
    </marker>
    <marker id="arr-support" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" opacity="0.7"/>
    </marker>
  </defs>

  <!-- === БЛОКИ === -->

  <!-- 1. Клиент (QR → Telegram) — слева -->
  <rect x="20" y="160" width="120" height="70" rx="8" fill="#0f1f30" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="80" y="186" font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="600">Клиент</text>
  <text x="80" y="201" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">QR с визитки →</text>
  <text x="80" y="214" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Telegram</text>

  <!-- 2. n8n Workflow — центр (главный блок) -->
  <rect x="210" y="120" width="200" height="160" rx="8" fill="#0f1f30" stroke="#22d3ee" stroke-width="2.5"/>
  <text x="310" y="148" font-family="Inter, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle" font-weight="700">n8n Workflow</text>
  <text x="310" y="165" font-family="Inter, sans-serif" font-size="9" fill="#22d3ee" text-anchor="middle">Telegram Trigger (webhook)</text>
  <!-- Этапы внутри -->
  <rect x="222" y="174" width="176" height="16" rx="4" fill="#071828"/>
  <text x="310" y="185" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">① Приветствие + кнопка Старт</text>
  <rect x="222" y="194" width="176" height="16" rx="4" fill="#071828"/>
  <text x="310" y="205" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">② Проверка подписки → промокод 10%</text>
  <rect x="222" y="214" width="176" height="16" rx="4" fill="#071828"/>
  <text x="310" y="225" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">③ Проверка ссылки → промокод 15%</text>
  <rect x="222" y="234" width="176" height="16" rx="4" fill="#071828"/>
  <text x="310" y="245" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">④ /support — ручная проверка</text>
  <text x="310" y="270" font-family="Inter, sans-serif" font-size="9" fill="#22d3ee" text-anchor="middle">Global Data node</text>

  <!-- 3. Telegram Bot API — сверху по центру -->
  <rect x="380" y="20" width="160" height="70" rx="8" fill="#0f1f30" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="460" y="46" font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="600">Telegram Bot API</text>
  <text x="460" y="62" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">getChatMember</text>
  <text x="460" y="77" font-family="Inter, sans-serif" font-size="9" fill="#22d3ee" text-anchor="middle">Проверка подписки</text>

  <!-- 4. Google Sheets — справа -->
  <rect x="560" y="100" width="160" height="100" rx="8" fill="#0f1f30" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="640" y="126" font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="600">Google Sheets</text>
  <text x="640" y="142" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Лист «Промокоды»</text>
  <text x="640" y="155" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">код / тип / дата / статус</text>
  <line x1="568" y1="163" x2="712" y2="163" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
  <text x="640" y="177" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Лист «Клиенты»</text>
  <text x="640" y="190" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">TG ID / ник / промокод / статус</text>

  <!-- 5. Чат поддержки — снизу справа -->
  <rect x="560" y="260" width="160" height="70" rx="8" fill="#0f1f30" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="640" y="285" font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="600">Чат поддержки</text>
  <text x="640" y="301" font-family="Inter, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">/support команда</text>
  <text x="640" y="317" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Telegram группа оператора</text>

  <!-- 6. Instagram (проверка ссылки) — снизу по центру -->
  <rect x="220" y="340" width="180" height="60" rx="8" fill="#0f1f30" stroke="#22d3ee" stroke-width="1.5" opacity="0.8" stroke-dasharray="6,3"/>
  <text x="310" y="365" font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="600">Проверка ссылки</text>
  <text x="310" y="381" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">instagram.com/stories/</text>
  <text x="310" y="394" font-family="Inter, sans-serif" font-size="9" fill="#22d3ee" text-anchor="middle">формат URL (regex)</text>

  <!-- 7. Сервисный аккаунт GCP — справа снизу -->
  <rect x="740" y="140" width="140" height="55" rx="8" fill="#0f1f30" stroke="#22d3ee" stroke-width="1" opacity="0.7"/>
  <text x="810" y="162" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle" font-weight="600">Google Cloud</text>
  <text x="810" y="178" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Service Account</text>
  <text x="810" y="190" font-family="Inter, sans-serif" font-size="9" fill="#22d3ee" text-anchor="middle">OAuth2 API</text>

  <!-- === СТРЕЛКИ === -->

  <!-- Клиент → n8n -->
  <line x1="140" y1="195" x2="207" y2="200" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="172" y="188" font-family="Inter, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">message /</text>
  <text x="172" y="200" font-family="Inter, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">callback</text>

  <!-- n8n → Telegram Bot API (проверка подписки) -->
  <line x1="380" y1="130" x2="415" y2="90" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="382" y="108" font-family="Inter, sans-serif" font-size="8" fill="#94a3b8">getChatMember</text>

  <!-- Telegram Bot API → n8n (ответ) -->
  <line x1="415" y1="82" x2="385" y2="138" stroke="#22d3ee" stroke-width="1" marker-end="url(#arr-dashed)" opacity="0.5" stroke-dasharray="4,3"/>

  <!-- n8n → Google Sheets -->
  <line x1="410" y1="185" x2="557" y2="160" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="490" y="162" font-family="Inter, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">запись данных</text>

  <!-- Google Sheets → n8n (чтение промокодов) -->
  <line x1="557" y1="175" x2="410" y2="195" stroke="#22d3ee" stroke-width="1" marker-end="url(#arr-dashed)" opacity="0.5" stroke-dasharray="4,3"/>
  <text x="490" y="195" font-family="Inter, sans-serif" font-size="8" fill="#22d3ee" text-anchor="middle">промокоды</text>

  <!-- n8n → Чат поддержки -->
  <line x1="410" y1="255" x2="557" y2="285" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-support)" opacity="0.7" stroke-dasharray="5,3"/>
  <text x="490" y="258" font-family="Inter, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">/support</text>

  <!-- n8n → Проверка ссылки -->
  <line x1="310" y1="280" x2="310" y2="337" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>
  <text x="318" y="315" font-family="Inter, sans-serif" font-size="8" fill="#94a3b8">ссылка</text>

  <!-- Google Sheets → Service Account -->
  <line x1="720" y1="160" x2="738" y2="163" stroke="#22d3ee" stroke-width="1" marker-end="url(#arr-dashed)" opacity="0.5" stroke-dasharray="3,3"/>

  <!-- n8n → Клиент (ответ) -->
  <line x1="207" y1="210" x2="140" y2="210" stroke="#22d3ee" stroke-width="1" marker-end="url(#arr)" opacity="0.4" stroke-dasharray="4,3"/>

  <!-- Подписи типов данных -->
  <text x="450" y="418" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">──── основной поток</text>
  <text x="250" y="418" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">- - - обратный / ответ</text>
  <text x="650" y="418" font-family="Inter, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">──── поддержка</text>
</svg>
