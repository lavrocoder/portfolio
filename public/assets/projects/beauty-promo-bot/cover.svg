<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2744"/>
      <stop offset="100%" stop-color="#051020"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="botGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a4a6e"/>
      <stop offset="100%" stop-color="#0d2d45"/>
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Сетка-оверлей -->
  <g stroke="#22d3ee" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="420" x2="800" y2="420"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="0" y1="540" x2="800" y2="540"/>
    <line x1="80" y1="0" x2="80" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="600"/>
    <line x1="240" y1="0" x2="240" y2="600"/>
    <line x1="320" y1="0" x2="320" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/>
    <line x1="560" y1="0" x2="560" y2="600"/>
    <line x1="640" y1="0" x2="640" y2="600"/>
    <line x1="720" y1="0" x2="720" y2="600"/>
  </g>

  <!-- Чат-контейнер — центральный -->
  <rect x="210" y="80" width="380" height="440" rx="20" fill="#071828" stroke="#22d3ee" stroke-width="1" opacity="0.8"/>

  <!-- Шапка чата -->
  <rect x="210" y="80" width="380" height="52" rx="20" fill="#0d2d45"/>
  <rect x="210" y="110" width="380" height="22" fill="#0d2d45"/>

  <!-- Аватар бота в шапке -->
  <circle cx="245" cy="106" r="16" fill="#22d3ee" opacity="0.9"/>
  <!-- Иконка бота: face -->
  <rect x="238" y="99" width="14" height="10" rx="3" fill="#071828"/>
  <circle cx="242" cy="103" r="1.5" fill="#22d3ee"/>
  <circle cx="249" cy="103" r="1.5" fill="#22d3ee"/>
  <rect x="240" y="107" width="7" height="1.5" rx="1" fill="#22d3ee"/>

  <!-- Название бота -->
  <text x="270" y="101" font-family="monospace" font-size="12" fill="#e2e8f0" font-weight="bold">MY'RYTHM Bot</text>
  <text x="270" y="116" font-family="monospace" font-size="9" fill="#22d3ee">● online</text>

  <!-- Сообщение 1 — от бота (слева) -->
  <rect x="225" y="148" width="220" height="58" rx="12" fill="url(#bubbleGrad)" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="232" y="158" width="140" height="6" rx="3" fill="#22d3ee" opacity="0.4"/>
  <rect x="232" y="170" width="110" height="5" rx="2.5" fill="#22d3ee" opacity="0.25"/>
  <rect x="232" y="181" width="125" height="5" rx="2.5" fill="#22d3ee" opacity="0.25"/>
  <!-- Кнопка Старт -->
  <rect x="232" y="192" width="80" height="10" rx="5" fill="#22d3ee" opacity="0.6"/>
  <text x="272" y="200" font-family="monospace" font-size="7" fill="#071828" text-anchor="middle" font-weight="bold">▶ Старт</text>

  <!-- Сообщение 2 — от пользователя (справа) -->
  <rect x="345" y="222" width="220" height="44" rx="12" fill="#1a3a50" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.2"/>
  <rect x="352" y="232" width="80" height="5" rx="2.5" fill="#e2e8f0" opacity="0.5"/>
  <rect x="352" y="243" width="60" height="5" rx="2.5" fill="#e2e8f0" opacity="0.3"/>
  <text x="480" y="270" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="end">✓✓</text>

  <!-- Сообщение 3 — от бота (слева) с промокодом -->
  <rect x="225" y="282" width="235" height="80" rx="12" fill="url(#bubbleGrad)" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Заголовок промокода -->
  <rect x="232" y="292" width="100" height="6" rx="3" fill="#22d3ee" opacity="0.5"/>
  <!-- Промокод блок -->
  <rect x="232" y="304" width="140" height="22" rx="6" fill="#22d3ee" opacity="0.15" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="302" y="318" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle" font-weight="bold">RHYTHM10</text>
  <rect x="232" y="332" width="120" height="5" rx="2.5" fill="#22d3ee" opacity="0.25"/>
  <!-- Кнопка +15% -->
  <rect x="232" y="346" width="110" height="10" rx="5" fill="#22d3ee" opacity="0.6"/>
  <text x="287" y="354" font-family="monospace" font-size="7" fill="#071828" text-anchor="middle" font-weight="bold">Хочу +15% 🎁</text>

  <!-- Сообщение 4 — от пользователя с ссылкой -->
  <rect x="345" y="378" width="220" height="36" rx="12" fill="#1a3a50" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="352" y="393" font-family="monospace" font-size="8" fill="#22d3ee" opacity="0.8">instagram.com/stories/</text>
  <rect x="352" y="401" width="90" height="4" rx="2" fill="#e2e8f0" opacity="0.3"/>

  <!-- Сообщение 5 — финальный промокод 15% -->
  <rect x="225" y="430" width="235" height="72" rx="12" fill="url(#bubbleGrad)" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.6"/>
  <rect x="232" y="440" width="120" height="6" rx="3" fill="#22d3ee" opacity="0.5"/>
  <!-- Промокод 15% -->
  <rect x="232" y="452" width="155" height="22" rx="6" fill="#22d3ee" opacity="0.2" stroke="#22d3ee" stroke-width="1"/>
  <text x="309" y="466" font-family="monospace" font-size="11" fill="#22d3ee" text-anchor="middle" font-weight="bold">RHYTHM15</text>
  <rect x="232" y="480" width="100" height="5" rx="2.5" fill="#22d3ee" opacity="0.25"/>
  <rect x="232" y="491" width="80" height="5" rx="2.5" fill="#22d3ee" opacity="0.2"/>

  <!-- QR-код иконка слева -->
  <rect x="60" y="200" width="80" height="80" rx="8" fill="#071828" stroke="#22d3ee" stroke-width="1" opacity="0.6"/>
  <!-- QR паттерн (упрощённый) -->
  <rect x="68" y="208" width="20" height="20" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <rect x="72" y="212" width="12" height="12" rx="1" fill="#22d3ee" opacity="0.4"/>
  <rect x="92" y="208" width="6" height="6" rx="1" fill="#22d3ee" opacity="0.5"/>
  <rect x="100" y="208" width="6" height="6" rx="1" fill="#22d3ee" opacity="0.5"/>
  <rect x="92" y="216" width="14" height="6" rx="1" fill="#22d3ee" opacity="0.4"/>
  <rect x="68" y="230" width="20" height="20" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <rect x="72" y="234" width="12" height="12" rx="1" fill="#22d3ee" opacity="0.4"/>
  <rect x="92" y="232" width="8" height="4" rx="1" fill="#22d3ee" opacity="0.4"/>
  <rect x="92" y="238" width="6" height="4" rx="1" fill="#22d3ee" opacity="0.3"/>
  <rect x="100" y="234" width="6" height="8" rx="1" fill="#22d3ee" opacity="0.4"/>
  <rect x="68" y="252" width="38" height="4" rx="1" fill="#22d3ee" opacity="0.3"/>
  <rect x="68" y="258" width="24" height="4" rx="1" fill="#22d3ee" opacity="0.4"/>
  <rect x="94" y="256" width="12" height="4" rx="1" fill="#22d3ee" opacity="0.3"/>
  <text x="100" y="296" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle" opacity="0.6">QR с визитки</text>

  <!-- Стрелка от QR к чату -->
  <line x1="140" y1="240" x2="205" y2="240" stroke="#22d3ee" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <polygon points="205,237 212,240 205,243" fill="#22d3ee" opacity="0.4"/>

  <!-- Google Sheets иконка справа -->
  <rect x="660" y="220" width="80" height="70" rx="8" fill="#071828" stroke="#22d3ee" stroke-width="1" opacity="0.6"/>
  <rect x="667" y="228" width="66" height="8" rx="2" fill="#22d3ee" opacity="0.3"/>
  <rect x="667" y="240" width="66" height="6" rx="2" fill="#22d3ee" opacity="0.2"/>
  <rect x="667" y="250" width="66" height="6" rx="2" fill="#22d3ee" opacity="0.2"/>
  <rect x="667" y="260" width="66" height="6" rx="2" fill="#22d3ee" opacity="0.2"/>
  <rect x="667" y="270" width="40" height="6" rx="2" fill="#22d3ee" opacity="0.15"/>
  <!-- Разделитель столбцов -->
  <line x1="690" y1="228" x2="690" y2="280" stroke="#22d3ee" stroke-width="0.5" opacity="0.4"/>
  <line x1="710" y1="228" x2="710" y2="280" stroke="#22d3ee" stroke-width="0.5" opacity="0.4"/>
  <text x="700" y="300" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle" opacity="0.6">Google Sheets</text>

  <!-- Стрелка от чата к Sheets -->
  <line x1="595" y1="260" x2="655" y2="260" stroke="#22d3ee" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <polygon points="655,257 662,260 655,263" fill="#22d3ee" opacity="0.4"/>

  <!-- Частицы/точки -->
  <circle cx="150" cy="120" r="3" fill="#22d3ee" opacity="0.2"/>
  <circle cx="680" cy="150" r="5" fill="#22d3ee" opacity="0.15"/>
  <circle cx="90" cy="400" r="4" fill="#22d3ee" opacity="0.2"/>
  <circle cx="720" cy="420" r="3" fill="#22d3ee" opacity="0.25"/>
  <circle cx="650" cy="80" r="6" fill="#22d3ee" opacity="0.12"/>
  <circle cx="130" cy="520" r="4" fill="#22d3ee" opacity="0.18"/>
  <circle cx="740" cy="540" r="5" fill="#22d3ee" opacity="0.15"/>

  <!-- Акцент — угловая линия -->
  <line x1="0" y1="580" x2="80" y2="600" stroke="#22d3ee" stroke-width="2" opacity="0.15"/>
  <line x1="720" y1="0" x2="800" y2="40" stroke="#22d3ee" stroke-width="2" opacity="0.15"/>

  <!-- Лейбл n8n снизу -->
  <rect x="340" y="548" width="120" height="22" rx="11" fill="#22d3ee" opacity="0.12" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="400" y="563" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle" opacity="0.8">⚡ n8n workflow</text>
</svg>
