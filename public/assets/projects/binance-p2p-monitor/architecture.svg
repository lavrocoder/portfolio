<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420"
     style="background:#0d0d1a; font-family: 'Inter', sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" opacity="0.7"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981" opacity="0.7"/>
    </marker>
    <marker id="arr-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" opacity="0.7"/>
    </marker>
    <marker id="arr-indigo" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" opacity="0.7"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="#0d0d1a"/>

  <!-- Title -->
  <text x="450" y="32" font-size="14" fill="#94a3b8" text-anchor="middle">Архитектура: Binance P2P Monitor</text>

  <!-- Binance P2P API (top-left) -->
  <rect x="30" y="60" width="165" height="72" rx="8" fill="#0f1f30" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="112" y="89" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="600">Binance P2P API</text>
  <text x="112" y="107" font-size="10" fill="#f59e0b" text-anchor="middle">ТОП-10 мейкеров</text>
  <text x="112" y="122" font-size="9" fill="#94a3b8" text-anchor="middle">USDT · BTC · ETH · BNB</text>

  <!-- Binance Spot API (bottom-left) -->
  <rect x="30" y="210" width="165" height="72" rx="8" fill="#0f1f30" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="112" y="239" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="600">Binance Spot API</text>
  <text x="112" y="257" font-size="10" fill="#f59e0b" text-anchor="middle">Рыночная (спот) цена</text>
  <text x="112" y="272" font-size="9" fill="#94a3b8" text-anchor="middle">для расчёта спреда</text>

  <!-- Python Parser on Heroku (center, main) -->
  <rect x="340" y="130" width="220" height="120" rx="8" fill="#0f1f30" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="450" y="163" font-size="14" fill="#e2e8f0" text-anchor="middle" font-weight="700">Python Parser</text>
  <text x="450" y="182" font-size="11" fill="#f59e0b" text-anchor="middle">Heroku · 24/7</text>
  <text x="450" y="200" font-size="9" fill="#94a3b8" text-anchor="middle">расчёт спреда P2P и рыночного</text>
  <text x="450" y="216" font-size="9" fill="#94a3b8" text-anchor="middle">история · пороговые алерты</text>
  <text x="450" y="232" font-size="9" fill="#94a3b8" text-anchor="middle">таймер обновлений: 30s – 2 min</text>

  <!-- Google Sheets (top-right) -->
  <rect x="695" y="55" width="180" height="100" rx="8" fill="#0f1f30" stroke="#10b981" stroke-width="1.5"/>
  <text x="785" y="85" font-size="13" fill="#e2e8f0" text-anchor="middle" font-weight="600">Google Sheets</text>
  <text x="785" y="103" font-size="10" fill="#10b981" text-anchor="middle">Дашборд</text>
  <text x="785" y="119" font-size="9" fill="#94a3b8" text-anchor="middle">Цены ТОП-1 / ТОП-3 / спред</text>
  <text x="785" y="134" font-size="9" fill="#94a3b8" text-anchor="middle">История: шаг 30 мин</text>

  <!-- Telegram Bot (bottom-right) -->
  <rect x="695" y="240" width="180" height="82" rx="8" fill="#0f1f30" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="785" y="270" font-size="13" fill="#e2e8f0" text-anchor="middle" font-weight="600">Telegram Bot</text>
  <text x="785" y="289" font-size="10" fill="#22d3ee" text-anchor="middle">Уведомления</text>
  <text x="785" y="305" font-size="9" fill="#94a3b8" text-anchor="middle">Токен + тип спреда + значение</text>

  <!-- GitHub Config (bottom-center) -->
  <rect x="340" y="320" width="220" height="68" rx="8" fill="#0f1f30" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="348" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="600">GitHub · config.py</text>
  <text x="450" y="365" font-size="10" fill="#6366f1" text-anchor="middle">токены · пороги · интервалы</text>
  <text x="450" y="380" font-size="9" fill="#94a3b8" text-anchor="middle">авто-перезагрузка на Heroku</text>

  <!-- Arrows -->
  <!-- Binance P2P → Parser -->
  <line x1="195" y1="90" x2="338" y2="175" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="262" y="122" font-size="9" fill="#94a3b8" text-anchor="middle">P2P ордера</text>

  <!-- Binance Spot → Parser -->
  <line x1="195" y1="246" x2="338" y2="210" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7" stroke-dasharray="5,3"/>
  <text x="258" y="238" font-size="9" fill="#94a3b8" text-anchor="middle">спот цена</text>

  <!-- Parser → Google Sheets -->
  <line x1="560" y1="175" x2="693" y2="118" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)" opacity="0.7"/>
  <text x="632" y="140" font-size="9" fill="#94a3b8" text-anchor="middle">запись данных</text>

  <!-- Parser → Telegram -->
  <line x1="560" y1="215" x2="693" y2="268" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr-cyan)" opacity="0.7"/>
  <text x="633" y="254" font-size="9" fill="#94a3b8" text-anchor="middle">алерт при пороге</text>

  <!-- GitHub → Parser -->
  <line x1="450" y1="320" x2="450" y2="252" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arr-indigo)" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="472" y="290" font-size="9" fill="#6366f1" text-anchor="middle">конфиг</text>
</svg>
