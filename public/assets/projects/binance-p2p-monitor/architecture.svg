<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420"
     style="background:#0d0d1a; font-family: 'Inter', sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" opacity="0.7"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80" opacity="0.7"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f87171" opacity="0.7"/>
    </marker>
    <marker id="arr-indigo" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#818cf8" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#0d0d1a"/>

  <!-- Grid -->
  <g stroke="#f59e0b" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="150" y1="0" x2="150" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/>
    <line x1="450" y1="0" x2="450" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="750" y1="0" x2="750" y2="420"/>
  </g>

  <!-- === BLOCK: GitHub (config) — top center === -->
  <rect x="355" y="18" width="190" height="58" fill="#0f1f30" stroke="#818cf8" stroke-width="1.5" rx="8"/>
  <text x="450" y="42" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="600">GitHub</text>
  <text x="450" y="58" fill="#818cf8" font-size="10" text-anchor="middle">config.py · symbols.json</text>

  <!-- === BLOCK: Binance P2P API — left top === -->
  <rect x="25" y="105" width="175" height="65" fill="#0f1f30" stroke="#f59e0b" stroke-width="1.5" rx="8"/>
  <text x="112" y="130" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="600">Binance P2P API</text>
  <text x="112" y="147" fill="#f59e0b" font-size="10" text-anchor="middle">Топ-1 и Топ-3 мейкеры</text>
  <text x="112" y="161" fill="#94a3b8" font-size="10" text-anchor="middle">USDT · BTC · BUSD · BNB · ETH</text>

  <!-- === BLOCK: Binance Spot API — left bottom === -->
  <rect x="25" y="228" width="175" height="55" fill="#0f1f30" stroke="#f59e0b" stroke-width="1.5" rx="8"/>
  <text x="112" y="253" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="600">Binance Spot API</text>
  <text x="112" y="270" fill="#f59e0b" font-size="10" text-anchor="middle">Spot-цена для рыночного спреда</text>

  <!-- === BLOCK: main.py (Heroku) — center top, main block === -->
  <rect x="325" y="108" width="250" height="82" fill="#0f1f30" stroke="#f59e0b" stroke-width="2.5" rx="8"/>
  <text x="450" y="136" fill="#fbbf24" font-size="14" text-anchor="middle" font-weight="700">main.py</text>
  <text x="450" y="154" fill="#94a3b8" font-size="10" text-anchor="middle">Парсер P2P + Spot цен · расчёт спредов</text>
  <text x="450" y="170" fill="#6366f1" font-size="10" text-anchor="middle">Heroku · обновление каждые 30 сек</text>

  <!-- === BLOCK: history.py (Heroku) — center bottom === -->
  <rect x="325" y="243" width="250" height="68" fill="#0f1f30" stroke="#f59e0b" stroke-width="1.5" rx="8"/>
  <text x="450" y="268" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="600">history.py</text>
  <text x="450" y="285" fill="#94a3b8" font-size="10" text-anchor="middle">Снимок спредов в архив</text>
  <text x="450" y="300" fill="#6366f1" font-size="10" text-anchor="middle">Heroku · запись каждые 30 мин</text>

  <!-- === BLOCK: Google Sheets (main table) — right top === -->
  <rect x="700" y="105" width="175" height="65" fill="#0f1f30" stroke="#4ade80" stroke-width="1.5" rx="8"/>
  <text x="787" y="130" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="600">Google Sheets</text>
  <text x="787" y="147" fill="#4ade80" font-size="10" text-anchor="middle">Основная таблица</text>
  <text x="787" y="161" fill="#94a3b8" font-size="10" text-anchor="middle">Текущие спреды · калькулятор</text>

  <!-- === BLOCK: Google Sheets (history) — right middle === -->
  <rect x="700" y="228" width="175" height="55" fill="#0f1f30" stroke="#4ade80" stroke-width="1.5" rx="8"/>
  <text x="787" y="253" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="600">Google Sheets</text>
  <text x="787" y="270" fill="#4ade80" font-size="10" text-anchor="middle">История · лист 2</text>

  <!-- === BLOCK: Telegram Bot — right bottom === -->
  <rect x="700" y="336" width="175" height="55" fill="#0f1f30" stroke="#f87171" stroke-width="1.5" rx="8"/>
  <text x="787" y="361" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="600">Telegram Bot</text>
  <text x="787" y="378" fill="#f87171" font-size="10" text-anchor="middle">Алерты при выходе за порог</text>

  <!-- === ARROWS === -->

  <!-- GitHub → main.py (config read, dashed) -->
  <line x1="450" y1="76" x2="450" y2="108" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arr-indigo)" stroke-dasharray="5,3" opacity="0.65"/>

  <!-- GitHub → history.py (dashed, branching) -->
  <line x1="380" y1="76" x2="380" y2="243" stroke="#818cf8" stroke-width="1" marker-end="url(#arr-indigo)" stroke-dasharray="5,3" opacity="0.4"/>

  <!-- Binance P2P → main.py -->
  <line x1="200" y1="135" x2="325" y2="148" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.75"/>

  <!-- Binance Spot → main.py -->
  <line x1="200" y1="250" x2="325" y2="185" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.65"/>

  <!-- Binance P2P → history.py (dashed) -->
  <line x1="200" y1="155" x2="325" y2="268" stroke="#f59e0b" stroke-width="1" marker-end="url(#arr)" stroke-dasharray="4,3" opacity="0.35"/>

  <!-- main.py → Google Sheets main -->
  <line x1="575" y1="143" x2="700" y2="138" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)" opacity="0.75"/>

  <!-- history.py → Google Sheets history -->
  <line x1="575" y1="270" x2="700" y2="257" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)" opacity="0.75"/>

  <!-- main.py → Telegram (alert) -->
  <line x1="575" y1="178" x2="700" y2="358" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-red)" opacity="0.65"/>

  <!-- Arrow labels -->
  <text x="260" y="128" fill="#f59e0b" font-size="9" text-anchor="middle" opacity="0.85">P2P цены</text>
  <text x="255" y="225" fill="#f59e0b" font-size="9" text-anchor="middle" opacity="0.85">Spot цена</text>
  <text x="638" y="132" fill="#4ade80" font-size="9" text-anchor="middle" opacity="0.85">текущие данные</text>
  <text x="638" y="258" fill="#4ade80" font-size="9" text-anchor="middle" opacity="0.85">история (30 мин)</text>
  <text x="665" y="282" fill="#f87171" font-size="9" text-anchor="middle" opacity="0.7">алерт</text>
  <text x="416" y="105" fill="#818cf8" font-size="9" text-anchor="middle" opacity="0.65">настройки</text>

  <!-- Footer -->
  <text x="450" y="410" fill="#1e293b" font-size="10" text-anchor="middle">Python · Google Sheets API · Binance API · Telegram Bot API · Heroku · GitHub</text>
</svg>
