  <!-- Title block -->
  <text x="60" y="65" font-family="'Inter', monospace" font-size="22" font-weight="600" fill="#f59e0b" opacity="0.95">Binance P2P Monitor</text>
  <text x="60" y="90" font-family="'Inter', monospace" font-size="12" fill="#94a3b8">Автоматический мониторинг P2P-рынка · Google Sheets · Telegram-уведомления</text>

  <!-- Metric Card 1: USDT Price -->
  <rect x="60" y="118" width="155" height="88" rx="8" fill="url(#cardGrad)" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.35"/>
  <text x="78" y="144" font-family="monospace" font-size="10" fill="#94a3b8">USDT / RUB</text>
  <text x="78" y="170" font-family="monospace" font-size="23" font-weight="700" fill="#f59e0b">90.42</text>
  <text x="78" y="190" font-family="monospace" font-size="10" fill="#10b981">▲ +0.8% к споту</text>

  <!-- Metric Card 2: P2P Spread -->
  <rect x="232" y="118" width="155" height="88" rx="8" fill="url(#cardGrad)" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.35"/>
  <text x="250" y="144" font-family="monospace" font-size="10" fill="#94a3b8">Спред P2P</text>
  <text x="250" y="170" font-family="monospace" font-size="23" font-weight="700" fill="#f59e0b">3.24%</text>
  <text x="250" y="190" font-family="monospace" font-size="10" fill="#ef4444">⚡ выше порога</text>

  <!-- Metric Card 3: Market Spread -->
  <rect x="404" y="118" width="155" height="88" rx="8" fill="url(#cardGrad)" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.35"/>
  <text x="422" y="144" font-family="monospace" font-size="10" fill="#94a3b8">Спред рынка</text>
  <text x="422" y="170" font-family="monospace" font-size="23" font-weight="700" fill="#f59e0b">8.19%</text>
  <text x="422" y="190" font-family="monospace" font-size="10" fill="#94a3b8">P2P vs Spot</text>

  <!-- Metric Card 4: Uptime -->
  <rect x="576" y="118" width="164" height="88" rx="8" fill="url(#cardGrad)" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.35"/>
  <text x="594" y="144" font-family="monospace" font-size="10" fill="#94a3b8">Обновление</text>
  <text x="594" y="170" font-family="monospace" font-size="23" font-weight="700" fill="#f59e0b">30s</text>
  <text x="594" y="190" font-family="monospace" font-size="10" fill="#94a3b8">24/7 · Heroku</text>

  <!-- Spread history chart panel -->
  <rect x="60" y="232" width="508" height="178" rx="8" fill="#0f0e00" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.2"/>
