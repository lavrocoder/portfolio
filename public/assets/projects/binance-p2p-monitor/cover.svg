  <rect x="585" y="232" width="155" height="178" rx="8" fill="#0a1520" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.45"/>
  <text x="605" y="258" font-family="monospace" font-size="11" fill="#22d3ee">✈ Telegram</text>

