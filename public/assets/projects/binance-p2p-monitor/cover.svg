  <rect x="88"  y="363" width="26" height="25" rx="2" fill="url(#barGrad)"/>
  <rect x="124" y="348" width="26" height="40" rx="2" fill="url(#barGrad)"/>
  <rect x="160" y="338" width="26" height="50" rx="2" fill="url(#barGrad)"/>
  <rect x="196" y="353" width="26" height="35" rx="2" fill="url(#barGrad)"/>
  <rect x="232" y="343" width="26" height="45" rx="2" fill="url(#barGrad)"/>
  <rect x="268" y="328" width="26" height="60" rx="2" fill="url(#barGrad)"/>
  <rect x="304" y="358" width="26" height="30" rx="2" fill="url(#barGrad)"/>
  <rect x="340" y="336" width="26" height="52" rx="2" fill="url(#barGrad)"/>
  <rect x="376" y="323" width="26" height="65" rx="2" fill="url(#barGrad)"/>
  <rect x="412" y="346" width="26" height="42" rx="2" fill="url(#barGrad)"/>
  <rect x="448" y="313" width="26" height="75" rx="2" fill="#f59e0b" opacity="0.9"/>
  <rect x="484" y="340" width="26" height="48" rx="2" fill="url(#barGrad)"/>

  <!-- Threshold line -->
  <line x1="78" y1="338" x2="525" y2="338" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" opacity="0.55"/>
  <text x="530" y="342" font-family="monospace" font-size="9" fill="#ef4444" opacity="0.7">порог</text>

  <!-- X-axis labels -->
  <text x="88"  y="406" font-family="monospace" font-size="9" fill="#64748b">00:00</text>
  <text x="196" y="406" font-family="monospace" font-size="9" fill="#64748b">06:00</text>
  <text x="304" y="406" font-family="monospace" font-size="9" fill="#64748b">12:00</text>
  <text x="412" y="406" font-family="monospace" font-size="9" fill="#64748b">18:00</text>
  <text x="484" y="406" font-family="monospace" font-size="9" fill="#64748b">21:00</text>

