  <text x="605" y="383" font-family="monospace" font-size="10" fill="#f59e0b">USDT · BTC · ETH · BNB</text>
  <text x="605" y="397" font-family="monospace" font-size="9" fill="#64748b">Тинькофф</text>

  <!-- Stack badges -->
  <rect x="60" y="440" width="700" height="50" rx="8" fill="#140f00" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.18"/>
  <text x="80" y="462" font-family="monospace" font-size="9" fill="#64748b">Stack:</text>

  <rect x="116" y="448" width="52" height="22" rx="4" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.45"/>
  <text x="142" y="463" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">Python</text>

  <rect x="176" y="448" width="104" height="22" rx="4" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.45"/>
  <text x="228" y="463" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">Binance P2P API</text>

  <rect x="288" y="448" width="108" height="22" rx="4" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.45"/>
  <text x="342" y="463" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">Google Sheets API</text>

  <rect x="404" y="448" width="70" height="22" rx="4" fill="#22d3ee" fill-opacity="0.08" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.45"/>
  <text x="439" y="463" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle">Telegram</text>

  <rect x="482" y="448" width="52" height="22" rx="4" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.45"/>
  <text x="508" y="463" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">Heroku</text>

  <rect x="542" y="448" width="52" height="22" rx="4" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.45"/>
  <text x="568" y="463" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">GitHub</text>

  <!-- Particles -->
  <circle cx="752" cy="100" r="3" fill="#f59e0b" opacity="0.3"/>
  <circle cx="28" cy="310" r="5" fill="#f59e0b" opacity="0.12"/>
  <circle cx="782" cy="420" r="4" fill="#f59e0b" opacity="0.18"/>
  <circle cx="42" cy="175" r="3" fill="#f59e0b" opacity="0.22"/>
  <circle cx="772" cy="510" r="6" fill="#f59e0b" opacity="0.08"/>
  <circle cx="18" cy="490" r="4" fill="#f59e0b" opacity="0.15"/>

  <!-- Corner accent -->
  <line x1="742" y1="38" x2="782" y2="38" stroke="#f59e0b" stroke-width="1.5" opacity="0.35"/>
  <line x1="782" y1="38" x2="782" y2="68" stroke="#f59e0b" stroke-width="1.5" opacity="0.35"/>
</svg>
