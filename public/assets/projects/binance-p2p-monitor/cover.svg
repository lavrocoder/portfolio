  <rect x="598" y="266" width="130" height="78" rx="6" fill="#0f1f2a" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="608" y="284" font-family="monospace" font-size="9" fill="#94a3b8">🔔 Сигнал P2P</text>
  <text x="608" y="300" font-family="monospace" font-size="10" font-weight="600" fill="#f59e0b">USDT спред: 3.24%</text>
  <text x="608" y="315" font-family="monospace" font-size="9" fill="#94a3b8">Порог: &gt; 3.0%</text>
  <text x="608" y="328" font-family="monospace" font-size="8" fill="#64748b">14:30 · auto</text>

  <!-- Pairs list -->
