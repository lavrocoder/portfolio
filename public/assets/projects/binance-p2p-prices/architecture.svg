<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420"
     style="background:#0d0d1a; font-family: 'Inter', sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488" opacity="0.7"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2dd4bf" opacity="0.7"/>
    </marker>
    <marker id="arr-indigo" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#818cf8" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#0d0d1a"/>

  <!-- Grid -->
  <g stroke="#0d9488" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="150" y1="0" x2="150" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/>
    <line x1="450" y1="0" x2="450" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="750" y1="0" x2="750" y2="420"/>
  </g>

  <!-- === BLOCK: GitHub config (top center) === -->
  <rect x="355" y="18" width="190" height="58" fill="#0f1f30" stroke="#818cf8" stroke-width="1.5" rx="8"/>
  <text x="450" y="43" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="600">GitHub</text>
  <text x="450" y="59" fill="#818cf8" font-size="10" text-anchor="middle">config.py · assets · pay_types</text>

  <!-- === BLOCK: Binance P2P API (left, single main source) === -->
  <rect x="25" y="160" width="185" height="80" fill="#0f1f30" stroke="#0d9488" stroke-width="1.5" rx="8"/>
  <text x="117" y="189" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="600">Binance P2P API</text>
  <text x="117" y="207" fill="#0d9488" font-size="10" text-anchor="middle">Топ-10 продавцов</text>
  <text x="117" y="221" fill="#94a3b8" font-size="10" text-anchor="middle">USDT, BTC · Tinkoff, QIMI</text>

  <!-- === BLOCK: main.py on Heroku (center, main block) === -->
  <rect x="325" y="145" width="250" height="100" fill="#0f1f30" stroke="#0d9488" stroke-width="2.5" rx="8"/>
  <text x="450" y="175" fill="#2dd4bf" font-size="14" text-anchor="middle" font-weight="700">main.py</text>
  <text x="450" y="195" fill="#94a3b8" font-size="10" text-anchor="middle">Парсинг P2P офферов</text>
  <text x="450" y="211" fill="#94a3b8" font-size="10" text-anchor="middle">Запись в Google Sheets</text>
  <text x="450" y="229" fill="#6366f1" font-size="10" text-anchor="middle">Heroku · каждые 2 минуты</text>

  <!-- === BLOCK: Google Sheets (right) === -->
  <rect x="700" y="145" width="175" height="100" fill="#0f1f30" stroke="#2dd4bf" stroke-width="1.5" rx="8"/>
  <text x="787" y="180" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="600">Google Sheets</text>
  <text x="787" y="198" fill="#2dd4bf" font-size="10" text-anchor="middle">Топ-10 цен по каждой</text>
  <text x="787" y="212" fill="#2dd4bf" font-size="10" text-anchor="middle">паре и методу оплаты</text>
  <text x="787" y="228" fill="#94a3b8" font-size="10" text-anchor="middle">Google Cloud · сервис. аккаунт</text>

  <!-- === BLOCK: Пользователь (right bottom) === -->
  <rect x="700" y="305" width="175" height="60" fill="#0f1f30" stroke="#4b7070" stroke-width="1.5" rx="8"/>
  <text x="787" y="330" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="600">Пользователь</text>
  <text x="787" y="348" fill="#94a3b8" font-size="10" text-anchor="middle">Просмотр и анализ цен</text>

  <!-- === ARROWS === -->

  <!-- GitHub → main.py (config, dashed) -->
  <line x1="450" y1="76" x2="450" y2="145" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arr-indigo)" stroke-dasharray="5,3" opacity="0.65"/>

  <!-- Binance P2P API → main.py -->
  <line x1="210" y1="200" x2="325" y2="200" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr)" opacity="0.8"/>

  <!-- main.py → Google Sheets -->
  <line x1="575" y1="200" x2="700" y2="200" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arr-green)" opacity="0.8"/>

  <!-- Google Sheets → Пользователь -->
  <line x1="787" y1="245" x2="787" y2="305" stroke="#4b7070" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Arrow labels -->
  <text x="265" y="192" fill="#0d9488" font-size="9" text-anchor="middle" opacity="0.85">топ-10 офферов</text>
  <text x="638" y="192" fill="#2dd4bf" font-size="9" text-anchor="middle" opacity="0.85">запись цен</text>
  <text x="420" y="104" fill="#818cf8" font-size="9" text-anchor="middle" opacity="0.65">настройки</text>
  <text x="820" y="278" fill="#4b7070" font-size="9" text-anchor="middle" opacity="0.6">просмотр</text>

  <!-- Note block: configurable -->
  <rect x="25" y="310" width="270" height="70" fill="#0a1a0a" stroke="#155e5e" stroke-width="1" rx="6"/>
  <text x="45" y="333" fill="#4b7070" font-family="Inter, sans-serif" font-size="10">Конфигурация (config.py)</text>
  <text x="45" y="352" fill="#2dd4bf" font-family="Inter, sans-serif" font-size="11">assets = ["USDT", "BTC", ...]</text>
  <text x="45" y="369" fill="#2dd4bf" font-family="Inter, sans-serif" font-size="11">pay_types = ["Tinkoff", "QIMI", ...]</text>

  <!-- Footer -->
  <text x="450" y="410" fill="#1e293b" font-size="10" text-anchor="middle">Python · Binance P2P API · Google Sheets API · Google Cloud · Heroku · GitHub</text>
</svg>
