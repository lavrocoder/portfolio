<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420"
     style="background:#0d0d1a; font-family: 'Inter', sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0b90b" opacity="0.7"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" opacity="0.7"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa" opacity="0.6"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="#0d0d1a"/>

  <!-- ── Binance P2P API (top center) ── -->
  <rect x="325" y="25" width="190" height="75" rx="8" fill="#0f1f30" stroke="#f0b90b" stroke-width="1.5"/>
  <text x="420" y="52" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="bold">Binance P2P API</text>
  <text x="420" y="69" fill="#94a3b8" font-size="10" text-anchor="middle">p2p.binance.com</text>
  <text x="420" y="85" fill="#f0b90b" font-size="10" text-anchor="middle">/bapi/c2c/v2/friendly/c2c/adv/search</text>

  <!-- ── Google Colab (left) ── -->
  <rect x="50" y="170" width="160" height="75" rx="8" fill="#0f1f30" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="130" y="198" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="bold">Google Colab</text>
  <text x="130" y="215" fill="#94a3b8" font-size="10" text-anchor="middle">среда выполнения</text>
  <text x="130" y="232" fill="#f59e0b" font-size="10" text-anchor="middle">▶ ручной запуск</text>

  <!-- ── Python Script (center, main) ── -->
  <rect x="285" y="155" width="220" height="105" rx="8" fill="#0f1f30" stroke="#f0b90b" stroke-width="2"/>
  <text x="395" y="183" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="bold">Python Script</text>
  <text x="395" y="200" fill="#94a3b8" font-size="10" text-anchor="middle">one_file.py</text>
  <text x="395" y="218" fill="#f0b90b" font-size="10" text-anchor="middle">requests · gspread</text>
  <text x="395" y="235" fill="#94a3b8" font-size="10" text-anchor="middle">4 активa × buy/sell × банки</text>
  <text x="395" y="250" fill="#94a3b8" font-size="10" text-anchor="middle">с суммой 10K ₽ и без</text>

  <!-- ── GCP Service Account (bottom center) ── -->
  <rect x="285" y="330" width="220" height="65" rx="8" fill="#0f1f30" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="395" y="357" fill="#e2e8f0" font-size="12" text-anchor="middle" font-weight="bold">Google Cloud</text>
  <text x="395" y="373" fill="#94a3b8" font-size="10" text-anchor="middle">Service Account</text>
  <text x="395" y="387" fill="#60a5fa" font-size="10" text-anchor="middle">secret.json · аутентификация</text>

  <!-- ── Google Sheets API (right) ── -->
  <rect x="575" y="170" width="160" height="75" rx="8" fill="#0f1f30" stroke="#34d399" stroke-width="1.5"/>
  <text x="655" y="198" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="bold">Sheets API</text>
  <text x="655" y="215" fill="#94a3b8" font-size="10" text-anchor="middle">Google Sheets API v4</text>
  <text x="655" y="232" fill="#34d399" font-size="10" text-anchor="middle">gspread</text>

  <!-- ── Google Sheets (far right) ── -->
  <rect x="760" y="130" width="120" height="165" rx="8" fill="#0f1f30" stroke="#34d399" stroke-width="1.5"/>
  <text x="820" y="158" fill="#e2e8f0" font-size="12" text-anchor="middle" font-weight="bold">Google</text>
  <text x="820" y="174" fill="#e2e8f0" font-size="12" text-anchor="middle" font-weight="bold">Sheets</text>
  <!-- Mini table inside -->
  <rect x="775" y="186" width="90" height="8" rx="2" fill="#34d399" opacity="0.35"/>
  <rect x="775" y="198" width="90" height="6" rx="2" fill="#34d399" opacity="0.15"/>
  <rect x="775" y="208" width="90" height="6" rx="2" fill="#34d399" opacity="0.15"/>
  <rect x="775" y="218" width="90" height="6" rx="2" fill="#34d399" opacity="0.15"/>
  <rect x="775" y="228" width="90" height="6" rx="2" fill="#34d399" opacity="0.15"/>
  <rect x="775" y="238" width="90" height="6" rx="2" fill="#34d399" opacity="0.12"/>
  <text x="820" y="262" fill="#34d399" font-size="10" text-anchor="middle">Таблица цен</text>
  <text x="820" y="277" fill="#94a3b8" font-size="9" text-anchor="middle">авто-обновление</text>
  <text x="820" y="288" fill="#94a3b8" font-size="9" text-anchor="middle">при запуске</text>

  <!-- ── Arrows ── -->

  <!-- Colab → Python Script -->
  <line x1="210" y1="207" x2="283" y2="207" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="246" y="198" fill="#94a3b8" font-size="9" text-anchor="middle">запускает</text>

  <!-- Python → Binance API (request, going up on right side) -->
  <line x1="415" y1="155" x2="415" y2="102" stroke="#f0b90b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="460" y="132" fill="#94a3b8" font-size="9">POST запросы</text>

  <!-- Binance API → Python (response, going down on left side, dashed) -->
  <line x1="375" y1="100" x2="375" y2="155" stroke="#f0b90b" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr)" opacity="0.45"/>
  <text x="330" y="132" fill="#94a3b8" font-size="9" text-anchor="end">JSON-ответ</text>

  <!-- Python → Sheets API -->
  <line x1="505" y1="207" x2="573" y2="207" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)" opacity="0.7"/>
  <text x="539" y="198" fill="#94a3b8" font-size="9" text-anchor="middle">запись</text>

  <!-- Sheets API → Google Sheets -->
  <line x1="735" y1="207" x2="758" y2="207" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)" opacity="0.7"/>

  <!-- Service Account → Python Script (dashed, auth) -->
  <line x1="395" y1="330" x2="395" y2="262" stroke="#60a5fa" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-blue)" opacity="0.5"/>
  <text x="440" y="300" fill="#94a3b8" font-size="9">аутентификация</text>

  <!-- Footer label -->
  <text x="450" y="412" fill="#94a3b8" font-size="9" text-anchor="middle" opacity="0.55">USDT · BTC · ETH · BNB  ×  buy/sell  ×  с суммой 10K ₽ / без суммы  ×  Tinkoff / другие банки</text>
</svg>
