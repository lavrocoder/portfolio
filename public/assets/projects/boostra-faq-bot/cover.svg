<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2744"/>
      <stop offset="100%" stop-color="#051020"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <g stroke="#22d3ee" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="420" x2="800" y2="420"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="0" y1="540" x2="800" y2="540"/>
    <line x1="80" y1="0" x2="80" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="600"/>
    <line x1="240" y1="0" x2="240" y2="600"/>
    <line x1="320" y1="0" x2="320" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/>
    <line x1="560" y1="0" x2="560" y2="600"/>
    <line x1="640" y1="0" x2="640" y2="600"/>
    <line x1="720" y1="0" x2="720" y2="600"/>
  </g>

  <!-- Phone mockup -->
  <rect x="55" y="65" width="200" height="370" rx="20" fill="#071828" stroke="#22d3ee" stroke-width="1.5"/>
  <!-- Phone notch -->
  <rect x="115" y="65" width="80" height="14" rx="7" fill="#0a1e30"/>
  <!-- Screen area -->
  <rect x="65" y="88" width="180" height="338" rx="12" fill="#071020"/>

  <!-- Chat header -->
  <rect x="65" y="88" width="180" height="40" rx="12" fill="#0d2040"/>
  <rect x="65" y="108" width="180" height="20" fill="#0d2040"/>
  <!-- Bot avatar -->
  <circle cx="92" cy="108" r="13" fill="#0a3050" stroke="#22d3ee" stroke-width="1"/>
  <text x="92" y="113" fill="#22d3ee" font-size="12" text-anchor="middle">B</text>
  <!-- Bot name -->
  <text x="113" y="104" fill="#e2e8f0" font-size="10" font-family="sans-serif" font-weight="600">Boostra Bot</text>
  <text x="113" y="117" fill="#22d3ee" font-size="8" font-family="sans-serif">● онлайн</text>

  <!-- Chat messages -->
  <!-- User message -->
  <rect x="130" y="140" width="100" height="24" rx="10" fill="#1a3a5c"/>
  <text x="180" y="156" fill="#e2e8f0" font-size="10" text-anchor="middle" font-family="sans-serif">Привет!</text>

  <!-- Bot response -->
  <rect x="70" y="174" width="155" height="50" rx="10" fill="#0d2540"/>
  <text x="148" y="190" fill="#e2e8f0" font-size="9" text-anchor="middle" font-family="sans-serif">Выберите вопрос</text>
  <text x="148" y="202" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="sans-serif">или напишите номер (1–11):</text>
  <text x="148" y="216" fill="#22d3ee" font-size="8" text-anchor="middle" font-family="sans-serif">1. Хочу заём  2. Не пришла SMS...</text>

  <!-- User types "3" -->
  <rect x="166" y="234" width="40" height="22" rx="8" fill="#1a3a5c"/>
  <text x="186" y="249" fill="#e2e8f0" font-size="11" text-anchor="middle" font-family="sans-serif" font-weight="600">3</text>

  <!-- Bot answer -->
  <rect x="70" y="266" width="145" height="38" rx="10" fill="#0d2540"/>
  <text x="142" y="281" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="sans-serif">Новый заём доступен сразу</text>
  <text x="142" y="293" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="sans-serif">после погашения предыдущего</text>

  <!-- Bot: link button -->
  <rect x="70" y="314" width="155" height="26" rx="8" fill="#0a3050" stroke="#22d3ee" stroke-width="1"/>
  <text x="147" y="331" fill="#22d3ee" font-size="10" text-anchor="middle" font-family="sans-serif">→ Оформить заём</text>

  <!-- Time label -->
  <text x="155" y="360" fill="#374151" font-size="8" text-anchor="middle" font-family="sans-serif">сегодня, 14:23</text>

  <!-- Input bar -->
  <rect x="70" y="375" width="170" height="40" rx="10" fill="#0d2040"/>
  <text x="110" y="400" fill="#374151" font-size="10" font-family="sans-serif">Напишите сообщение...</text>

  <!-- FAQ panel (right side) -->
  <rect x="290" y="70" width="460" height="375" rx="10" fill="#06141e" stroke="#22d3ee" stroke-width="1"/>
  <!-- Panel header -->
  <rect x="290" y="70" width="460" height="36" rx="10" fill="#0d2540"/>
  <rect x="290" y="90" width="460" height="16" fill="#0d2540"/>
  <text x="520" y="93" fill="#22d3ee" font-size="12" text-anchor="middle" font-family="sans-serif" font-weight="600">FAQ — Типовые обращения (11 сценариев)</text>

  <!-- FAQ items - column 1 -->
  <text x="314" y="130" fill="#94a3b8" font-size="10" font-family="sans-serif">1.</text>
  <text x="328" y="130" fill="#e2e8f0" font-size="10" font-family="sans-serif">Хочу заём</text>

  <text x="314" y="153" fill="#94a3b8" font-size="10" font-family="sans-serif">2.</text>
  <text x="328" y="153" fill="#e2e8f0" font-size="10" font-family="sans-serif">Не приходит SMS</text>

  <text x="314" y="176" fill="#94a3b8" font-size="10" font-family="sans-serif">3.</text>
  <text x="328" y="176" fill="#e2e8f0" font-size="10" font-family="sans-serif">Когда можно взять новый заём</text>

  <text x="314" y="199" fill="#94a3b8" font-size="10" font-family="sans-serif">4.</text>
  <text x="328" y="199" fill="#e2e8f0" font-size="10" font-family="sans-serif">Сколько рассматривается заявка</text>

  <text x="314" y="222" fill="#94a3b8" font-size="10" font-family="sans-serif">5.</text>
  <text x="328" y="222" fill="#e2e8f0" font-size="10" font-family="sans-serif">Удалить личный кабинет</text>

  <text x="314" y="245" fill="#94a3b8" font-size="10" font-family="sans-serif">6.</text>
  <text x="328" y="245" fill="#e2e8f0" font-size="10" font-family="sans-serif">Поменять номер телефона</text>

  <!-- Divider -->
  <line x1="514" y1="115" x2="514" y2="415" stroke="#22d3ee" stroke-width="0.5" opacity="0.2"/>

  <!-- FAQ items - column 2 -->
  <text x="528" y="130" fill="#94a3b8" font-size="10" font-family="sans-serif">7.</text>
  <text x="542" y="130" fill="#e2e8f0" font-size="10" font-family="sans-serif">Удалить / добавить карту</text>

  <text x="528" y="153" fill="#94a3b8" font-size="10" font-family="sans-serif">8.</text>
  <text x="542" y="153" fill="#e2e8f0" font-size="10" font-family="sans-serif">Узнать сумму долга</text>

  <text x="528" y="176" fill="#94a3b8" font-size="10" font-family="sans-serif">9.</text>
  <text x="542" y="176" fill="#e2e8f0" font-size="10" font-family="sans-serif">Списали деньги после займа</text>

  <text x="528" y="199" fill="#94a3b8" font-size="10" font-family="sans-serif">10.</text>
  <text x="548" y="199" fill="#e2e8f0" font-size="10" font-family="sans-serif">Нет моего вопроса</text>

  <text x="528" y="222" fill="#94a3b8" font-size="10" font-family="sans-serif">11.</text>
  <text x="548" y="222" fill="#e2e8f0" font-size="10" font-family="sans-serif">Хочу заработать</text>

  <!-- Input mode badges -->
  <rect x="314" y="290" width="90" height="28" rx="6" fill="#0a2040" stroke="#22d3ee" stroke-width="1"/>
  <text x="359" y="308" fill="#22d3ee" font-size="10" text-anchor="middle" font-family="sans-serif">🔘 Кнопки меню</text>

  <text x="416" y="308" fill="#374151" font-size="14" font-family="sans-serif">+</text>

  <rect x="428" y="290" width="100" height="28" rx="6" fill="#0a2040" stroke="#22d3ee" stroke-width="1"/>
  <text x="478" y="308" fill="#22d3ee" font-size="10" text-anchor="middle" font-family="sans-serif">⌨ Цифра 1–11</text>

  <text x="544" y="308" fill="#374151" font-size="14" font-family="sans-serif">→</text>
  <text x="570" y="308" fill="#94a3b8" font-size="10" font-family="sans-serif">автоответ</text>

  <!-- Link button example -->
  <rect x="314" y="336" width="220" height="30" rx="6" fill="#062040" stroke="#22d3ee" stroke-width="1"/>
  <text x="424" y="356" fill="#22d3ee" font-size="11" text-anchor="middle" font-family="sans-serif">→ Перейти на boostra.ru</text>

  <!-- Stats row -->
  <rect x="314" y="388" width="88" height="42" rx="6" fill="#0a2040"/>
  <text x="358" y="406" fill="#22d3ee" font-size="16" text-anchor="middle" font-family="sans-serif" font-weight="700">11</text>
  <text x="358" y="420" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="sans-serif">сценариев</text>

  <rect x="416" y="388" width="88" height="42" rx="6" fill="#0a2040"/>
  <text x="460" y="406" fill="#22d3ee" font-size="16" text-anchor="middle" font-family="sans-serif" font-weight="700">2</text>
  <text x="460" y="420" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="sans-serif">режима ввода</text>

  <rect x="518" y="388" width="88" height="42" rx="6" fill="#0a2040"/>
  <text x="562" y="406" fill="#22d3ee" font-size="14" text-anchor="middle" font-family="sans-serif" font-weight="700">24/7</text>
  <text x="562" y="420" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="sans-serif">без оператора</text>

  <!-- Title section -->
  <line x1="50" y1="465" x2="750" y2="465" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
  <text x="400" y="504" fill="#e2e8f0" font-size="24" text-anchor="middle" font-family="sans-serif" font-weight="700">Boostra FAQ Bot</text>
  <text x="400" y="532" fill="#22d3ee" font-size="13" text-anchor="middle" font-family="sans-serif">Python · Telegram Bot API · МФО клиентская поддержка</text>

  <!-- Particles -->
  <circle cx="30" cy="200" r="3" fill="#22d3ee" opacity="0.2"/>
  <circle cx="775" cy="100" r="5" fill="#22d3ee" opacity="0.15"/>
  <circle cx="770" cy="490" r="4" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="28" cy="530" r="6" fill="#22d3ee" opacity="0.1"/>
  <circle cx="760" cy="360" r="3" fill="#67e8f9" opacity="0.2"/>

  <!-- Corner accent -->
  <line x1="0" y1="0" x2="48" y2="0" stroke="#22d3ee" stroke-width="3"/>
  <line x1="0" y1="0" x2="0" y2="48" stroke="#22d3ee" stroke-width="3"/>
  <line x1="800" y1="600" x2="752" y2="600" stroke="#22d3ee" stroke-width="3"/>
  <line x1="800" y1="600" x2="800" y2="552" stroke="#22d3ee" stroke-width="3"/>
</svg>
