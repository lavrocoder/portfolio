<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#0d0d1a; font-family: 'Inter', sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981" opacity="0.7"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Bitrix24 -->
  <rect x="30" y="150" width="140" height="100" rx="8" fill="#0a2010" stroke="#10b981" stroke-width="2"/>
  <text x="100" y="193" text-anchor="middle" fill="#e2e8f0" font-size="14">Bitrix24</text>
  <text x="100" y="213" text-anchor="middle" fill="#34d399" font-size="11">CRM</text>
  <text x="100" y="233" text-anchor="middle" fill="#94a3b8" font-size="10">Webhooks →</text>

  <!-- Two-way arrow to Integration -->
  <line x1="170" y1="200" x2="310" y2="200" stroke="#10b981" stroke-width="2" marker-end="url(#arr)" opacity="0.7"/>
  <line x1="310" y1="215" x2="170" y2="215" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)" opacity="0.5"/>

  <!-- Integration Microservice -->
  <rect x="310" y="120" width="280" height="160" rx="8" fill="#0a2010" stroke="#34d399" stroke-width="2.5"/>
  <text x="450" y="168" text-anchor="middle" fill="#e2e8f0" font-size="14">Integration Service</text>
  <text x="450" y="188" text-anchor="middle" fill="#94a3b8" font-size="11">FastAPI</text>
  <rect x="330" y="198" width="110" height="20" rx="4" fill="#062010" stroke="#10b981" stroke-width="0.5"/>
  <text x="385" y="212" text-anchor="middle" fill="#34d399" font-size="10">Transform Layer</text>
  <rect x="450" y="198" width="120" height="20" rx="4" fill="#062010" stroke="#10b981" stroke-width="0.5"/>
  <text x="510" y="212" text-anchor="middle" fill="#34d399" font-size="10">Reconciliation</text>
  <rect x="330" y="226" width="240" height="20" rx="4" fill="#062010" stroke="#10b981" stroke-width="0.5"/>
  <text x="450" y="240" text-anchor="middle" fill="#34d399" font-size="10">Audit Log — All changes recorded</text>
  <text x="450" y="264" text-anchor="middle" fill="#10b981" font-size="10">Python + FastAPI</text>

  <!-- Two-way arrow to 1C -->
  <line x1="590" y1="200" x2="720" y2="200" stroke="#10b981" stroke-width="2" marker-end="url(#arr)" opacity="0.7"/>
  <line x1="720" y1="215" x2="590" y2="215" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)" opacity="0.5"/>

  <!-- 1C -->
  <rect x="720" y="150" width="140" height="100" rx="8" fill="#0a2010" stroke="#10b981" stroke-width="2"/>
  <text x="790" y="193" text-anchor="middle" fill="#e2e8f0" font-size="14">1С</text>
  <text x="790" y="213" text-anchor="middle" fill="#34d399" font-size="11">ERP</text>
  <text x="790" y="233" text-anchor="middle" fill="#94a3b8" font-size="10">REST API</text>

  <!-- RabbitMQ -->
  <rect x="370" y="330" width="160" height="60" rx="8" fill="#0a2010" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="358" text-anchor="middle" fill="#e2e8f0" font-size="13">RabbitMQ</text>
  <text x="450" y="376" text-anchor="middle" fill="#f59e0b" font-size="10">Async event queue</text>

  <line x1="450" y1="280" x2="450" y2="330" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>

  <!-- PostgreSQL -->
  <rect x="600" y="330" width="130" height="60" rx="8" fill="#0a2010" stroke="#10b981" stroke-width="1.5"/>
  <text x="665" y="358" text-anchor="middle" fill="#e2e8f0" font-size="13">PostgreSQL</text>
  <text x="665" y="376" text-anchor="middle" fill="#94a3b8" font-size="10">Audit storage</text>

  <line x1="590" y1="250" x2="665" y2="330" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
</svg>
