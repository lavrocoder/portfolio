<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420"
     style="background:#0d0d1a; font-family: 'Inter', sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488" opacity="0.7"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5865f2" opacity="0.7"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981" opacity="0.7"/>
    </marker>
  </defs>

  <!-- ===== INPUT: Excel файл ===== -->
  <rect x="30" y="170" width="130" height="70" rx="8" fill="#0f1f30" stroke="#0d9488" stroke-width="1.5"/>
  <text x="95" y="198" fill="#e2e8f0" font-size="13" text-anchor="middle">Excel</text>
  <text x="95" y="213" fill="#94a3b8" font-size="10" text-anchor="middle">accounts.xlsx</text>
  <text x="95" y="229" fill="#0d9488" font-size="10" text-anchor="middle">токены · логины</text>

  <!-- ===== Python скрипт загрузки ===== -->
  <rect x="220" y="155" width="140" height="100" rx="8" fill="#0f1f30" stroke="#0d9488" stroke-width="2"/>
  <text x="290" y="183" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="600">Python</text>
  <text x="290" y="198" fill="#94a3b8" font-size="10" text-anchor="middle">loader script</text>
  <text x="290" y="218" fill="#0d9488" font-size="10" text-anchor="middle">парсинг Excel</text>
  <text x="290" y="232" fill="#0d9488" font-size="10" text-anchor="middle">подготовка данных</text>
  <text x="290" y="246" fill="#94a3b8" font-size="9" text-anchor="middle">Python 3</text>

  <!-- Excel → Python -->
  <line x1="160" y1="205" x2="218" y2="205" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- ===== ADS Power ===== -->
  <rect x="430" y="130" width="160" height="150" rx="8" fill="#0f1f30" stroke="#0d9488" stroke-width="2.5"/>
  <text x="510" y="158" fill="#e2e8f0" font-size="14" text-anchor="middle" font-weight="600">ADS Power</text>
  <text x="510" y="174" fill="#94a3b8" font-size="10" text-anchor="middle">антидетект-браузер</text>
  <line x1="440" y1="185" x2="580" y2="185" stroke="#0d9488" stroke-width="0.5" opacity="0.3"/>
  <text x="510" y="200" fill="#94a3b8" font-size="10" text-anchor="middle">Profile 1 → Discord acc_01</text>
  <text x="510" y="216" fill="#94a3b8" font-size="10" text-anchor="middle">Profile 2 → Discord acc_02</text>
  <text x="510" y="232" fill="#94a3b8" font-size="10" text-anchor="middle">Profile 3 → Discord acc_03</text>
  <text x="510" y="248" fill="#94a3b8" font-size="10" text-anchor="middle">Profile N → ...</text>
  <text x="510" y="270" fill="#0d9488" font-size="10" text-anchor="middle">Task: Discord Login</text>

  <!-- Python → ADS Power -->
  <line x1="360" y1="205" x2="428" y2="205" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- ===== Proxy слой ===== -->
  <rect x="430" y="30" width="160" height="65" rx="8" fill="#0f1f30" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="510" y="55" fill="#e2e8f0" font-size="12" text-anchor="middle">Static Proxies</text>
  <text x="510" y="70" fill="#f59e0b" font-size="10" text-anchor="middle">уникальный IP</text>
  <text x="510" y="84" fill="#94a3b8" font-size="9" text-anchor="middle">на каждый профиль</text>

  <!-- Proxy → ADS Power -->
  <line x1="510" y1="95" x2="510" y2="128" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6" stroke-dasharray="5,3"/>

  <!-- ===== Discord серверы ===== -->
  <rect x="665" y="130" width="120" height="150" rx="8" fill="#0f1f30" stroke="#5865f2" stroke-width="1.5"/>
  <text x="725" y="158" fill="#e2e8f0" font-size="13" text-anchor="middle">Discord</text>
  <text x="725" y="174" fill="#94a3b8" font-size="10" text-anchor="middle">серверы</text>
  <line x1="675" y1="185" x2="775" y2="185" stroke="#5865f2" stroke-width="0.5" opacity="0.3"/>
  <circle cx="693" cy="205" r="4" fill="#10b981" opacity="0.8"/>
  <text x="748" y="209" fill="#94a3b8" font-size="10" text-anchor="middle">acc_01 online</text>
  <circle cx="693" cy="225" r="4" fill="#10b981" opacity="0.8"/>
  <text x="748" y="229" fill="#94a3b8" font-size="10" text-anchor="middle">acc_02 online</text>
  <circle cx="693" cy="245" r="4" fill="#10b981" opacity="0.8"/>
  <text x="748" y="249" fill="#94a3b8" font-size="10" text-anchor="middle">acc_03 online</text>
  <circle cx="693" cy="265" r="4" fill="#f59e0b" opacity="0.6"/>
  <text x="748" y="269" fill="#94a3b8" font-size="10" text-anchor="middle">acc_N ...</text>

  <!-- ADS Power → Discord -->
  <line x1="590" y1="205" x2="663" y2="205" stroke="#5865f2" stroke-width="1.5" marker-end="url(#arr-blue)" opacity="0.7"/>

  <!-- ===== Отчёты сессий ===== -->
  <rect x="430" y="330" width="160" height="65" rx="8" fill="#0f1f30" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="510" y="355" fill="#e2e8f0" font-size="12" text-anchor="middle">Reports (TXT)</text>
  <text x="510" y="371" fill="#94a3b8" font-size="10" text-anchor="middle">report_{task_id}.txt</text>
  <text x="510" y="386" fill="#94a3b8" font-size="9" text-anchor="middle">по каждой сессии</text>

  <!-- ADS Power → Reports -->
  <line x1="510" y1="280" x2="510" y2="328" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)" opacity="0.5" stroke-dasharray="5,3"/>

  <!-- ===== Python merge скрипт ===== -->
  <rect x="220" y="330" width="140" height="65" rx="8" fill="#0f1f30" stroke="#10b981" stroke-width="1.5"/>
  <text x="290" y="355" fill="#e2e8f0" font-size="12" text-anchor="middle">Python</text>
  <text x="290" y="370" fill="#94a3b8" font-size="10" text-anchor="middle">report merger</text>
  <text x="290" y="386" fill="#10b981" font-size="9" text-anchor="middle">объединяет файлы</text>

  <!-- Reports → Merge -->
  <line x1="428" y1="362" x2="362" y2="362" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)" opacity="0.7"/>

  <!-- ===== Итоговый отчёт ===== -->
  <rect x="30" y="330" width="130" height="65" rx="8" fill="#0f1f30" stroke="#10b981" stroke-width="1.5"/>
  <text x="95" y="355" fill="#e2e8f0" font-size="12" text-anchor="middle">Итог отчёт</text>
  <text x="95" y="371" fill="#94a3b8" font-size="10" text-anchor="middle">final_report.txt</text>
  <text x="95" y="386" fill="#10b981" font-size="9" text-anchor="middle">сводная таблица</text>

  <!-- Merge → Final Report -->
  <line x1="218" y1="362" x2="162" y2="362" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)" opacity="0.7"/>

  <!-- Подписи потоков -->
  <text x="289" y="198" fill="#94a3b8" font-size="9" text-anchor="middle">данные аккаунтов</text>
  <text x="469" y="198" fill="#94a3b8" font-size="9" text-anchor="middle">конфиг профилей</text>
  <text x="626" y="198" fill="#94a3b8" font-size="9" text-anchor="middle">авторизация</text>
</svg>
