  <!-- Стрелки от Excel к профилям -->
  <line x1="310" y1="74" x2="230" y2="165" stroke="#0d9488" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="400" y1="92" x2="400" y2="140" stroke="#0d9488" stroke-width="1.5" opacity="0.6"/>
  <line x1="490" y1="74" x2="570" y2="165" stroke="#0d9488" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Частицы -->
  <circle cx="60" cy="100" r="3" fill="#0d9488" opacity="0.3"/>
  <circle cx="750" cy="80" r="4" fill="#0d9488" opacity="0.2"/>
  <circle cx="740" cy="500" r="3" fill="#5865f2" opacity="0.3"/>
  <circle cx="50" cy="480" r="5" fill="#0d9488" opacity="0.15"/>
  <circle cx="400" cy="540" r="6" fill="#0d9488" opacity="0.1"/>

  <!-- Заголовок -->
  <text x="400" y="510" fill="#e2e8f0" font-size="18" font-family="'Inter', sans-serif" text-anchor="middle" font-weight="600">Multi-Account Discord Automation</text>
  <text x="400" y="535" fill="#0d9488" font-size="13" font-family="'Inter', sans-serif" text-anchor="middle">ADS Power · Static Proxies · Python</text>

