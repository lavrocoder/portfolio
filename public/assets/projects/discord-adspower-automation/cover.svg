  <rect x="310" y="140" width="180" height="28" rx="10" fill="#0d9488" opacity="0.4"/>
  <circle cx="330" cy="154" r="5" fill="#ef4444" opacity="0.7"/>
  <circle cx="348" cy="154" r="5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="366" cy="154" r="5" fill="#10b981" opacity="0.7"/>
  <ellipse cx="400" cy="240" rx="36" ry="29" fill="#5865f2" opacity="0.9"/>
  <circle cx="387" cy="237" r="7" fill="#0f2020"/>
  <circle cx="413" cy="237" r="7" fill="#0f2020"/>
  <path d="M384 252 Q400 260 416 252" stroke="#0f2020" stroke-width="3" fill="none" stroke-linecap="round"/>
