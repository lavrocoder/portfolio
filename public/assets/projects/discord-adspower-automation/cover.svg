  <text x="170" y="311" fill="#0d9488" font-size="11" font-family="monospace" text-anchor="middle">IP: 194.35.12.41</text>
  <!-- Account label -->
  <text x="170" y="358" fill="#94a3b8" font-size="10" font-family="monospace" text-anchor="middle">account_01</text>
