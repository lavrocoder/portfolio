  <circle cx="560" cy="174" r="5" fill="#ef4444" opacity="0.7"/>
  <circle cx="578" cy="174" r="5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="596" cy="174" r="5" fill="#10b981" opacity="0.7"/>
  <ellipse cx="630" cy="248" rx="32" ry="26" fill="#5865f2" opacity="0.8"/>
  <circle cx="618" cy="245" r="6" fill="#0f2020"/>
  <circle cx="642" cy="245" r="6" fill="#0f2020"/>
  <path d="M615 258 Q630 265 645 258" stroke="#0f2020" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <rect x="552" y="295" width="156" height="22" rx="4" fill="#0d9488" opacity="0.15"/>
  <text x="630" y="311" fill="#0d9488" font-size="11" font-family="monospace" text-anchor="middle">IP: 46.228.91.17</text>
