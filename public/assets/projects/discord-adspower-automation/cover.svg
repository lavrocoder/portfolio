  <circle cx="136" cy="174" r="5" fill="#10b981" opacity="0.7"/>
  <!-- Иконка Discord (упрощённая) -->
  <ellipse cx="170" cy="248" rx="32" ry="26" fill="#5865f2" opacity="0.8"/>
  <circle cx="158" cy="245" r="6" fill="#0f2020"/>
  <circle cx="182" cy="245" r="6" fill="#0f2020"/>
  <path d="M155 258 Q170 265 185 258" stroke="#0f2020" stroke-width="2.5" fill="none" stroke-linecap="round"/>
