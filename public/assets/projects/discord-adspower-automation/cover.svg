  <line x1="800" y1="600" x2="760" y2="600" stroke="#0d9488" stroke-width="2" opacity="0.6"/>
  <line x1="800" y1="600" x2="800" y2="560" stroke="#0d9488" stroke-width="2" opacity="0.6"/>
