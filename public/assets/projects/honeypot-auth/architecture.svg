<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420"
     style="background:#0d0d1a; font-family: 'Inter', sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" opacity="0.7"/>
    </marker>
    <marker id="arr-log" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" opacity="0.7"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#0d0d1a"/>

  <!-- Grid -->
  <g stroke="#6366f1" stroke-width="0.4" opacity="0.04">
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="90" y1="0" x2="90" y2="420"/>
    <line x1="180" y1="0" x2="180" y2="420"/>
    <line x1="270" y1="0" x2="270" y2="420"/>
    <line x1="360" y1="0" x2="360" y2="420"/>
    <line x1="450" y1="0" x2="450" y2="420"/>
    <line x1="540" y1="0" x2="540" y2="420"/>
    <line x1="630" y1="0" x2="630" y2="420"/>
    <line x1="720" y1="0" x2="720" y2="420"/>
    <line x1="810" y1="0" x2="810" y2="420"/>
  </g>

  <!-- Title -->
  <text x="450" y="26" fill="#94a3b8" font-size="12" text-anchor="middle" opacity="0.5">HoneyAuth — Архитектура системы</text>

  <!-- ===== BLOCK 1: Attackers (far left) ===== -->
  <rect x="18" y="158" width="110" height="80" rx="8" fill="#0f1f30" stroke="#6366f1" stroke-width="1.5"/>
  <text x="73" y="190" fill="#e2e8f0" font-size="12" text-anchor="middle">Атакующие</text>
  <text x="73" y="206" fill="#94a3b8" font-size="9" text-anchor="middle">Brute Force</text>
  <text x="73" y="220" fill="#ef4444" font-size="9" text-anchor="middle">89+ IP-адресов</text>

  <!-- Arrow: Attackers → Nginx -->
  <line x1="128" y1="198" x2="196" y2="198" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="162" y="193" fill="#818cf8" font-size="8.5" text-anchor="middle">HTTPS</text>

  <!-- ===== BLOCK 2: Debian Server (big frame) ===== -->
  <rect x="196" y="40" width="510" height="340" rx="10" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="230" y="62" fill="#475569" font-size="10">Debian Linux Server</text>

  <!-- ===== BLOCK 3: Nginx (inside Debian) ===== -->
  <rect x="216" y="138" width="130" height="120" rx="8" fill="#0f1f30" stroke="#6366f1" stroke-width="2"/>
  <text x="281" y="170" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="bold">Nginx</text>
  <text x="281" y="188" fill="#94a3b8" font-size="9.5" text-anchor="middle">Reverse Proxy</text>
  <text x="281" y="208" fill="#818cf8" font-size="9" text-anchor="middle">:443</text>
  <text x="281" y="222" fill="#818cf8" font-size="9" text-anchor="middle">:10443</text>
  <text x="281" y="236" fill="#818cf8" font-size="9" text-anchor="middle">:4443</text>

  <!-- Redirect note -->
  <text x="281" y="254" fill="#64748b" font-size="8" text-anchor="middle">→ redirect / to /login</text>

  <!-- Arrow: Nginx → Cisco ASA container -->
  <line x1="346" y1="168" x2="396" y2="130" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>

  <!-- Arrow: Nginx → FortiGate container -->
  <line x1="346" y1="198" x2="396" y2="210" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>

  <!-- Arrow: Nginx → VPN container -->
  <line x1="346" y1="228" x2="396" y2="290" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>

  <!-- ===== BLOCK 4: Docker Cisco ASA :443 ===== -->
  <rect x="396" y="80" width="155" height="80" rx="8" fill="#0f1f30" stroke="#6366f1" stroke-width="1.5"/>
  <text x="474" y="106" fill="#e2e8f0" font-size="11" text-anchor="middle">Cisco ASA Clone</text>
  <text x="474" y="122" fill="#818cf8" font-size="9.5" text-anchor="middle">Docker Container</text>
  <text x="474" y="138" fill="#10b981" font-size="9" text-anchor="middle">Port :443</text>
  <text x="474" y="152" fill="#64748b" font-size="8.5" text-anchor="middle">/+CSCOE+/logon.html</text>

  <!-- ===== BLOCK 5: Docker FortiGate :10443 ===== -->
  <rect x="396" y="180" width="155" height="80" rx="8" fill="#0f1f30" stroke="#6366f1" stroke-width="1.5"/>
  <text x="474" y="206" fill="#e2e8f0" font-size="11" text-anchor="middle">FortiGate Clone</text>
  <text x="474" y="222" fill="#818cf8" font-size="9.5" text-anchor="middle">Docker Container</text>
  <text x="474" y="238" fill="#10b981" font-size="9" text-anchor="middle">Port :10443</text>
  <text x="474" y="252" fill="#64748b" font-size="8.5" text-anchor="middle">/remote/login?lang=en</text>

  <!-- ===== BLOCK 6: Docker VPN :4443 ===== -->
  <rect x="396" y="280" width="155" height="80" rx="8" fill="#0f1f30" stroke="#6366f1" stroke-width="1.5"/>
  <text x="474" y="306" fill="#e2e8f0" font-size="11" text-anchor="middle">VPN Portal Clone</text>
  <text x="474" y="322" fill="#818cf8" font-size="9.5" text-anchor="middle">Docker Container</text>
  <text x="474" y="338" fill="#10b981" font-size="9" text-anchor="middle">Port :4443</text>
  <text x="474" y="352" fill="#64748b" font-size="8.5" text-anchor="middle">/sslvpnLogin.html</text>

  <!-- Arrows: containers → Log Aggregator -->
  <!-- Cisco ASA → Log Aggregator -->
  <line x1="551" y1="120" x2="624" y2="165" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-log)" opacity="0.6" stroke-dasharray="5,3"/>

  <!-- FortiGate → Log Aggregator -->
  <line x1="551" y1="220" x2="624" y2="210" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-log)" opacity="0.6" stroke-dasharray="5,3"/>

  <!-- VPN → Log Aggregator -->
  <line x1="551" y1="320" x2="624" y2="255" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-log)" opacity="0.6" stroke-dasharray="5,3"/>

  <!-- ===== BLOCK 7: Log Aggregator ===== -->
  <rect x="624" y="140" width="145" height="100" rx="8" fill="#0f1f30" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="697" y="168" fill="#e2e8f0" font-size="11" text-anchor="middle">Log Aggregator</text>
  <text x="697" y="185" fill="#94a3b8" font-size="9" text-anchor="middle">Per-site logs</text>
  <text x="697" y="201" fill="#f59e0b" font-size="9" text-anchor="middle">+ общий файл all_creds</text>
  <text x="697" y="217" fill="#64748b" font-size="8.5" text-anchor="middle">login:password format</text>
  <text x="697" y="232" fill="#64748b" font-size="8.5" text-anchor="middle">cron ротация / 2 дня</text>

  <!-- Arrow: Log Aggregator → creds/ folder -->
  <line x1="697" y1="240" x2="697" y2="296" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)" opacity="0.7"/>

  <!-- ===== BLOCK 8: creds/ folder ===== -->
  <rect x="624" y="296" width="145" height="72" rx="8" fill="#0a1a0a" stroke="#10b981" stroke-width="1.5"/>
  <text x="697" y="322" fill="#e2e8f0" font-size="11" text-anchor="middle">/logs/creds/</text>
  <text x="697" y="340" fill="#10b981" font-size="9" text-anchor="middle">all_creds_YYYYMMDD.log</text>
  <text x="697" y="356" fill="#64748b" font-size="8.5" text-anchor="middle">logs_from_docker/</text>

  <!-- Legend -->
  <line x1="730" y1="390" x2="758" y2="390" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
  <text x="762" y="394" fill="#94a3b8" font-size="9">HTTP трафик</text>
  <line x1="730" y1="406" x2="758" y2="406" stroke="#f59e0b" stroke-width="1.5" opacity="0.7" stroke-dasharray="5,3"/>
  <text x="762" y="410" fill="#94a3b8" font-size="9">Логирование</text>
  <line x1="650" y1="390" x2="678" y2="390" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
  <text x="682" y="394" fill="#94a3b8" font-size="9">Запись файлов</text>
</svg>
