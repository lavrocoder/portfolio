<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#0d0d1a; font-family: 'Inter', sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Telegram -->
  <rect x="30" y="170" width="130" height="70" rx="8" fill="#0f1f30" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="95" y="200" text-anchor="middle" fill="#e2e8f0" font-size="13">Telegram</text>
  <text x="95" y="220" text-anchor="middle" fill="#22d3ee" font-size="11">Пользователь</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="205" x2="210" y2="205" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- aiogram Bot -->
  <rect x="210" y="155" width="150" height="100" rx="8" fill="#0f1f30" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="285" y="197" text-anchor="middle" fill="#e2e8f0" font-size="13">aiogram Bot</text>
  <text x="285" y="215" text-anchor="middle" fill="#94a3b8" font-size="10">FSM States</text>
  <text x="285" y="232" text-anchor="middle" fill="#22d3ee" font-size="10">Python</text>

  <!-- Arrow 2 -->
  <line x1="360" y1="205" x2="410" y2="205" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- Business Logic -->
  <rect x="410" y="155" width="160" height="100" rx="8" fill="#0f1f30" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="490" y="197" text-anchor="middle" fill="#e2e8f0" font-size="13">Бизнес-логика</text>
  <text x="490" y="215" text-anchor="middle" fill="#94a3b8" font-size="10">Handlers/Services</text>
  <text x="490" y="232" text-anchor="middle" fill="#22d3ee" font-size="10">Воронка найма</text>

  <!-- Arrow 3 -->
  <line x1="570" y1="205" x2="620" y2="205" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- PostgreSQL -->
  <rect x="620" y="155" width="130" height="100" rx="8" fill="#0f1f30" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="685" y="197" text-anchor="middle" fill="#e2e8f0" font-size="13">PostgreSQL</text>
  <text x="685" y="215" text-anchor="middle" fill="#94a3b8" font-size="10">Кандидаты</text>
  <text x="685" y="232" text-anchor="middle" fill="#94a3b8" font-size="10">История</text>

  <!-- Arrow down from Business Logic to Redis -->
  <line x1="490" y1="255" x2="490" y2="300" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>

  <!-- Redis -->
  <rect x="410" y="300" width="160" height="70" rx="8" fill="#0f1f30" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="490" y="330" text-anchor="middle" fill="#e2e8f0" font-size="13">Redis</text>
  <text x="490" y="350" text-anchor="middle" fill="#f59e0b" font-size="10">Состояния диалогов</text>

  <!-- Arrow up from Business Logic to HR Notify -->
  <line x1="490" y1="155" x2="490" y2="110" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>

  <!-- HR Notification -->
  <rect x="410" y="40" width="160" height="70" rx="8" fill="#0f1f30" stroke="#10b981" stroke-width="1.5"/>
  <text x="490" y="70" text-anchor="middle" fill="#e2e8f0" font-size="13">HR-уведомления</text>
  <text x="490" y="90" text-anchor="middle" fill="#10b981" font-size="10">→ HR-менеджер</text>

  <!-- Docker label -->
  <rect x="750" y="40" width="110" height="50" rx="8" fill="#0f1f30" stroke="#0ea5e9" stroke-width="1" opacity="0.7"/>
  <text x="805" y="62" text-anchor="middle" fill="#0ea5e9" font-size="12">Docker</text>
  <text x="805" y="80" text-anchor="middle" fill="#94a3b8" font-size="10">Deploy</text>
</svg>
