<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420"
     style="background:#0d0d1a; font-family: 'Inter', sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Config File -->
  <rect x="20" y="20" width="140" height="80" fill="#0f1f30" stroke="#0d9488" stroke-width="1.5" rx="8"/>
  <text x="90" y="45" fill="#e2e8f0" font-size="13" text-anchor="middle">config.json</text>
  <text x="90" y="65" fill="#94a3b8" font-size="10" text-anchor="middle">Настройки:</text>
  <text x="90" y="80" fill="#818cf8" font-size="10" text-anchor="middle">прокси, потоки, задержки</text>

  <!-- Стрелка к скриптам -->
  <line x1="160" y1="60" x2="220" y2="60" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- Registration Script -->
  <rect x="230" y="20" width="180" height="100" fill="#0f1f30" stroke="#0d9488" stroke-width="2" rx="8"/>
  <text x="320" y="45" fill="#e2e8f0" font-size="13" text-anchor="middle">register.py</text>
  <text x="320" y="70" fill="#94a3b8" font-size="10" text-anchor="middle">Регистрация аккаунтов</text>
  <text x="320" y="85" fill="#94a3b8" font-size="10" text-anchor="middle">Selenium + Chrome</text>
  <text x="320" y="105" fill="#818cf8" font-size="10" text-anchor="middle">30-40 сек/аккаунт</text>

  <!-- Comments Script -->
  <rect x="230" y="150" width="180" height="100" fill="#0f1f30" stroke="#0d9488" stroke-width="2" rx="8"/>
  <text x="320" y="175" fill="#e2e8f0" font-size="13" text-anchor="middle">comment.py</text>
  <text x="320" y="200" fill="#94a3b8" font-size="10" text-anchor="middle">Написание комментариев</text>
  <text x="320" y="215" fill="#94a3b8" font-size="10" text-anchor="middle">Selenium + Chrome</text>
  <text x="320" y="235" fill="#818cf8" font-size="10" text-anchor="middle">случайные задержки</text>

  <!-- Стрелки от скриптов к сайту -->
  <line x1="410" y1="70" x2="520" y2="100" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <line x1="410" y1="200" x2="520" y2="140" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- Mobile Proxy -->
  <rect x="230" y="290" width="180" height="70" fill="#0f1f30" stroke="#f59e0b" stroke-width="1.5" rx="8"/>
  <text x="320" y="315" fill="#e2e8f0" font-size="13" text-anchor="middle">Mobile Proxy</text>
  <text x="320" y="335" fill="#94a3b8" font-size="10" text-anchor="middle">Frigate / Megafon</text>
  <text x="320" y="350" fill="#f59e0b" font-size="10" text-anchor="middle">1 прокси = 1 поток</text>

  <!-- Стрелка от прокси к скриптам -->
  <line x1="320" y1="290" x2="320" y2="255" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7" stroke-dasharray="5,3"/>

  <!-- Litmarket.ru -->
  <rect x="540" y="80" width="180" height="100" fill="#0f1f30" stroke="#0d9488" stroke-width="2" rx="8"/>
  <text x="630" y="105" fill="#e2e8f0" font-size="13" text-anchor="middle">Litmarket.ru</text>
  <text x="630" y="130" fill="#94a3b8" font-size="10" text-anchor="middle">Книжный портал</text>
  <text x="630" y="150" fill="#94a3b8" font-size="10" text-anchor="middle">/books/{title}</text>
  <text x="630" y="170" fill="#818cf8" font-size="10" text-anchor="middle">антифрод-система</text>

  <!-- SQLite Database -->
  <rect x="540" y="220" width="180" height="100" fill="#0f1f30" stroke="#0d9488" stroke-width="1.5" rx="8"/>
  <text x="630" y="245" fill="#e2e8f0" font-size="13" text-anchor="middle">SQLite</text>
  <text x="630" y="270" fill="#94a3b8" font-size="10" text-anchor="middle">База аккаунтов</text>
  <text x="630" y="290" fill="#94a3b8" font-size="10" text-anchor="middle">логин, пароль, email</text>
  <text x="630" y="310" fill="#818cf8" font-size="10" text-anchor="middle">.db файл</text>

  <!-- Excel Files -->
  <rect x="540" y="350" width="180" height="60" fill="#0f1f30" stroke="#0d9488" stroke-width="1.5" rx="8"/>
  <text x="630" y="375" fill="#e2e8f0" font-size="13" text-anchor="middle">Excel / CSV</text>
  <text x="630" y="395" fill="#94a3b8" font-size="10" text-anchor="middle">ссылки, комментарии</text>

  <!-- Стрелки от сайта к БД и Excel -->
  <line x1="630" y1="180" x2="630" y2="220" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <line x1="630" y1="180" x2="630" y2="350" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7" stroke-dasharray="5,3"/>

  <!-- Terminal Output -->
  <rect x="20" y="320" width="180" height="90" fill="#071f1f" stroke="#0d9488" stroke-width="1.5" rx="8"/>
  <text x="110" y="345" fill="#e2e8f0" font-size="13" text-anchor="middle">Terminal Output</text>
  <rect x="40" y="355" width="140" height="8" fill="#0d9488" opacity="0.4"/>
  <rect x="40" y="370" width="120" height="8" fill="#0d9488" opacity="0.3"/>
  <rect x="40" y="385" width="130" height="8" fill="#0d9488" opacity="0.3"/>
  <rect x="40" y="400" width="100" height="8" fill="#0d9488" opacity="0.2"/>

  <!-- Стрелка от скриптов к терминалу -->
  <line x1="320" y1="250" x2="200" y2="320" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr)" opacity="0.5" stroke-dasharray="5,3"/>

  <!-- Подписи к стрелкам -->
  <text x="470" y="90" fill="#94a3b8" font-size="9">POST /register</text>
  <text x="470" y="160" fill="#94a3b8" font-size="9">POST /comment</text>
</svg>
