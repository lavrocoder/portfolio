<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" style="background:#0d0d1a; font-family: 'Inter', sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Clients -->
  <rect x="20" y="170" width="110" height="70" rx="8" fill="#0f2020" stroke="#0d9488" stroke-width="1.5"/>
  <text x="75" y="200" text-anchor="middle" fill="#e2e8f0" font-size="12">Клиенты</text>
  <text x="75" y="218" text-anchor="middle" fill="#2dd4bf" font-size="10">REST / WS</text>

  <line x1="130" y1="205" x2="180" y2="205" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- FastAPI Gateway -->
  <rect x="180" y="150" width="150" height="110" rx="8" fill="#0f2020" stroke="#14b8a6" stroke-width="2"/>
  <text x="255" y="190" text-anchor="middle" fill="#e2e8f0" font-size="13">FastAPI</text>
  <text x="255" y="208" text-anchor="middle" fill="#94a3b8" font-size="10">REST API</text>
  <text x="255" y="226" text-anchor="middle" fill="#94a3b8" font-size="10">WebSocket</text>
  <text x="255" y="244" text-anchor="middle" fill="#2dd4bf" font-size="10">OpenAPI docs</text>

  <line x1="330" y1="205" x2="380" y2="205" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- Adapter Layer -->
  <rect x="380" y="130" width="160" height="150" rx="8" fill="#0f2020" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="460" y="170" text-anchor="middle" fill="#e2e8f0" font-size="13">Adapters</text>
  <text x="460" y="190" text-anchor="middle" fill="#94a3b8" font-size="10">Strategy Pattern</text>
  <rect x="395" y="200" width="130" height="20" rx="4" fill="#0a2a20" stroke="#0d9488" stroke-width="0.5"/>
  <text x="460" y="214" text-anchor="middle" fill="#2dd4bf" font-size="10">Carrier A / B / C</text>
  <rect x="395" y="228" width="130" height="20" rx="4" fill="#0a2a20" stroke="#0d9488" stroke-width="0.5"/>
  <text x="460" y="242" text-anchor="middle" fill="#2dd4bf" font-size="10">External APIs</text>
  <rect x="395" y="256" width="130" height="16" rx="4" fill="#0a2a20" stroke="#0d9488" stroke-width="0.5"/>
  <text x="460" y="268" text-anchor="middle" fill="#2dd4bf" font-size="9">Transform / Normalize</text>

  <line x1="540" y1="205" x2="590" y2="205" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- PostgreSQL -->
  <rect x="590" y="155" width="130" height="100" rx="8" fill="#0f2020" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="655" y="195" text-anchor="middle" fill="#e2e8f0" font-size="13">PostgreSQL</text>
  <text x="655" y="213" text-anchor="middle" fill="#94a3b8" font-size="10">Partitioned</text>
  <text x="655" y="231" text-anchor="middle" fill="#2dd4bf" font-size="10">2M+ events</text>

  <!-- Celery + Redis (bottom) -->
  <line x1="460" y1="280" x2="460" y2="330" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>
  <rect x="370" y="330" width="180" height="70" rx="8" fill="#0f2020" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="460" y="360" text-anchor="middle" fill="#e2e8f0" font-size="13">Celery + Redis</text>
  <text x="460" y="378" text-anchor="middle" fill="#f59e0b" font-size="10">Sync every 5 min</text>

  <!-- External API -->
  <rect x="750" y="100" width="130" height="220" rx="8" fill="#0a1a1a" stroke="#0d9488" stroke-width="1" opacity="0.7"/>
  <text x="815" y="135" text-anchor="middle" fill="#94a3b8" font-size="12">External</text>
  <text x="815" y="153" text-anchor="middle" fill="#94a3b8" font-size="12">Carriers</text>
  <rect x="765" y="170" width="100" height="20" rx="4" fill="#0f2020"/>
  <text x="815" y="184" text-anchor="middle" fill="#2dd4bf" font-size="10">Carrier API #1</text>
  <rect x="765" y="200" width="100" height="20" rx="4" fill="#0f2020"/>
  <text x="815" y="214" text-anchor="middle" fill="#2dd4bf" font-size="10">Carrier API #2</text>
  <rect x="765" y="230" width="100" height="20" rx="4" fill="#0f2020"/>
  <text x="815" y="244" text-anchor="middle" fill="#2dd4bf" font-size="10">Carrier API #3</text>
  <rect x="765" y="260" width="100" height="20" rx="4" fill="#0f2020"/>
  <text x="815" y="274" text-anchor="middle" fill="#2dd4bf" font-size="10">Carrier API #4</text>
  <rect x="765" y="290" width="100" height="20" rx="4" fill="#0f2020"/>
  <text x="815" y="304" text-anchor="middle" fill="#2dd4bf" font-size="10">Carrier API #5</text>

  <line x1="540" y1="240" x2="750" y2="240" stroke="#0d9488" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
</svg>
