<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2a2a"/>
      <stop offset="100%" stop-color="#041515"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#0d9488" stroke-width="0.5" opacity="0.07">
    <line x1="0" y1="75" x2="800" y2="75"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/><line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- Route path -->
  <path d="M80 300 Q200 200 350 300 Q500 400 650 280 Q720 220 720 300" stroke="#0d9488" stroke-width="2.5" fill="none" stroke-dasharray="8,4" opacity="0.6"/>
  <!-- Nodes on path -->
  <circle cx="80" cy="300" r="14" fill="#0f2f2f" stroke="#0d9488" stroke-width="2"/>
  <circle cx="80" cy="300" r="5" fill="#0d9488"/>
  <circle cx="350" cy="300" r="14" fill="#0f2f2f" stroke="#0d9488" stroke-width="2"/>
  <circle cx="350" cy="300" r="5" fill="#0d9488"/>
  <circle cx="650" cy="280" r="14" fill="#0f2f2f" stroke="#0d9488" stroke-width="2"/>
  <circle cx="650" cy="280" r="5" fill="#0d9488"/>
  <!-- API boxes -->
  <rect x="100" y="130" width="180" height="60" rx="10" fill="#0a2020" stroke="#0d9488" stroke-width="1.5" opacity="0.9"/>
  <text x="190" y="157" text-anchor="middle" fill="#5eead4" font-size="13" font-family="monospace">GET /tracking</text>
  <text x="190" y="177" text-anchor="middle" fill="#2dd4bf" font-size="11" font-family="monospace" opacity="0.7">200 OK</text>
  <rect x="450" y="380" width="200" height="60" rx="10" fill="#0a2020" stroke="#14b8a6" stroke-width="1.5" opacity="0.9"/>
  <text x="550" y="407" text-anchor="middle" fill="#5eead4" font-size="13" font-family="monospace">POST /routes</text>
  <text x="550" y="427" text-anchor="middle" fill="#2dd4bf" font-size="11" font-family="monospace" opacity="0.7">201 Created</text>
  <!-- Status bubbles -->
  <rect x="540" y="100" width="180" height="120" rx="12" fill="#0a2020" stroke="#0d9488" stroke-width="1" opacity="0.8"/>
  <rect x="555" y="120" width="50" height="12" rx="6" fill="#10b981" opacity="0.8"/>
  <text x="612" y="131" fill="#10b981" font-size="11" font-family="monospace" opacity="0.8">Доставлен</text>
  <rect x="555" y="146" width="50" height="12" rx="6" fill="#f59e0b" opacity="0.8"/>
  <text x="612" y="157" fill="#f59e0b" font-size="11" font-family="monospace" opacity="0.8">В пути</text>
  <rect x="555" y="172" width="50" height="12" rx="6" fill="#3b82f6" opacity="0.8"/>
  <text x="612" y="183" fill="#6db4fb" font-size="11" font-family="monospace" opacity="0.8">Принят</text>
  <circle cx="700" cy="480" r="3" fill="#0d9488" opacity="0.4"/>
  <circle cx="120" cy="480" r="2" fill="#0d9488" opacity="0.3"/>
  <circle cx="400" cy="520" r="4" fill="#0d9488" opacity="0.25"/>
</svg>
