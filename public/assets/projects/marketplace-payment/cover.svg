<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0808"/>
      <stop offset="100%" stop-color="#0c0404"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#ef4444" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="75" x2="800" y2="75"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/><line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- Payment card mockup -->
  <rect x="180" y="180" width="440" height="260" rx="20" fill="#1a0808" stroke="#ef4444" stroke-width="1.5" opacity="0.9"/>
  <!-- Card shine -->
  <rect x="180" y="180" width="440" height="260" rx="20" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.3"/>
  <!-- Card chip -->
  <rect x="220" y="240" width="60" height="44" rx="6" fill="#c8a84b" opacity="0.7"/>
  <line x1="220" y1="262" x2="280" y2="262" stroke="#a8882b" stroke-width="1" opacity="0.5"/>
  <line x1="250" y1="240" x2="250" y2="284" stroke="#a8882b" stroke-width="1" opacity="0.5"/>
  <!-- Card number -->
  <text x="220" y="330" fill="#ef4444" font-size="18" font-family="monospace" letter-spacing="6" opacity="0.7">**** **** ****</text>
  <!-- NDA badge on card -->
  <rect x="510" y="210" width="80" height="28" rx="14" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="0.8"/>
  <text x="550" y="229" text-anchor="middle" fill="#ef4444" font-size="11" font-family="sans-serif" font-weight="700" letter-spacing="1">NDA</text>
  <!-- Flow arrows -->
  <rect x="70" y="290" width="80" height="50" rx="8" fill="#1a0808" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
  <text x="110" y="312" text-anchor="middle" fill="#ef4444" font-size="10" font-family="sans-serif">ЮKassa</text>
  <text x="110" y="330" text-anchor="middle" fill="#6b7280" font-size="9" font-family="sans-serif">Provider A</text>
  <rect x="650" y="250" width="80" height="50" rx="8" fill="#1a0808" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
  <text x="690" y="272" text-anchor="middle" fill="#ef4444" font-size="10" font-family="sans-serif">Тинькофф</text>
  <text x="690" y="290" text-anchor="middle" fill="#6b7280" font-size="9" font-family="sans-serif">Provider B</text>
  <rect x="650" y="340" width="80" height="50" rx="8" fill="#1a0808" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
  <text x="690" y="362" text-anchor="middle" fill="#ef4444" font-size="10" font-family="sans-serif">СБП</text>
  <text x="690" y="380" text-anchor="middle" fill="#6b7280" font-size="9" font-family="sans-serif">Provider C</text>
  <!-- Transaction counter -->
  <rect x="200" y="480" width="160" height="60" rx="10" fill="#1a0808" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
  <text x="280" y="508" text-anchor="middle" fill="#ef4444" font-size="20" font-weight="bold" font-family="sans-serif">10K+</text>
  <text x="280" y="528" text-anchor="middle" fill="#6b7280" font-size="11" font-family="sans-serif">транзакций/день</text>
  <circle cx="150" cy="150" r="3" fill="#ef4444" opacity="0.4"/>
  <circle cx="700" cy="150" r="2" fill="#ef4444" opacity="0.3"/>
</svg>
