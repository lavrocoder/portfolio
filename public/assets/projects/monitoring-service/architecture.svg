<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#0d0d1a; font-family: 'Inter', sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Celery Beat Scheduler -->
  <rect x="20" y="80" width="150" height="70" rx="8" fill="#0a0a20" stroke="#6366f1" stroke-width="1.5"/>
  <text x="95" y="112" text-anchor="middle" fill="#e2e8f0" font-size="12">Celery Beat</text>
  <text x="95" y="130" text-anchor="middle" fill="#818cf8" font-size="10">every 60 sec</text>

  <line x1="170" y1="115" x2="210" y2="200" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- Sites (multiple) -->
  <rect x="20" y="240" width="150" height="140" rx="8" fill="#0a0a20" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
  <text x="95" y="270" text-anchor="middle" fill="#94a3b8" font-size="12">Сайты</text>
  <text x="95" y="290" text-anchor="middle" fill="#818cf8" font-size="10">site1.example.com</text>
  <text x="95" y="308" text-anchor="middle" fill="#818cf8" font-size="10">site2.example.com</text>
  <text x="95" y="326" text-anchor="middle" fill="#818cf8" font-size="10">...</text>
  <text x="95" y="344" text-anchor="middle" fill="#6366f1" font-size="10">40+ URLs</text>
  <text x="95" y="364" text-anchor="middle" fill="#94a3b8" font-size="10">HTTP checks / SSL</text>

  <line x1="170" y1="310" x2="210" y2="250" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)" opacity="0.5"/>

  <!-- Core Monitoring -->
  <rect x="210" y="155" width="180" height="140" rx="8" fill="#0a0a20" stroke="#6366f1" stroke-width="2"/>
  <text x="300" y="197" text-anchor="middle" fill="#e2e8f0" font-size="13">Monitor Core</text>
  <text x="300" y="215" text-anchor="middle" fill="#94a3b8" font-size="10">Celery Workers</text>
  <text x="300" y="233" text-anchor="middle" fill="#94a3b8" font-size="10">HTTP / Status / SSL</text>
  <text x="300" y="251" text-anchor="middle" fill="#6366f1" font-size="10">Response time</text>
  <text x="300" y="269" text-anchor="middle" fill="#94a3b8" font-size="10">FastAPI</text>
  <text x="300" y="287" text-anchor="middle" fill="#818cf8" font-size="10">Python</text>

  <line x1="390" y1="225" x2="440" y2="225" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- PostgreSQL -->
  <rect x="440" y="180" width="130" height="90" rx="8" fill="#0a0a20" stroke="#6366f1" stroke-width="1.5"/>
  <text x="505" y="218" text-anchor="middle" fill="#e2e8f0" font-size="13">PostgreSQL</text>
  <text x="505" y="236" text-anchor="middle" fill="#94a3b8" font-size="10">Check results</text>
  <text x="505" y="254" text-anchor="middle" fill="#818cf8" font-size="10">Uptime history</text>

  <!-- Notification path (up) -->
  <line x1="300" y1="155" x2="300" y2="110" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>
  <rect x="220" y="40" width="160" height="70" rx="8" fill="#0a0a20" stroke="#ef4444" stroke-width="1.5"/>
  <text x="300" y="72" text-anchor="middle" fill="#e2e8f0" font-size="13">Telegram Bot</text>
  <text x="300" y="90" text-anchor="middle" fill="#ef4444" font-size="10">Alert on DOWN</text>
  <text x="300" y="104" text-anchor="middle" fill="#94a3b8" font-size="9">+ Recovery notify</text>

  <!-- Dashboard -->
  <rect x="620" y="155" width="150" height="130" rx="8" fill="#0a0a20" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="695" y="197" text-anchor="middle" fill="#e2e8f0" font-size="13">Dashboard</text>
  <text x="695" y="215" text-anchor="middle" fill="#94a3b8" font-size="10">FastAPI + Jinja2</text>
  <text x="695" y="233" text-anchor="middle" fill="#22d3ee" font-size="10">Status overview</text>
  <text x="695" y="251" text-anchor="middle" fill="#94a3b8" font-size="10">Uptime reports</text>
  <text x="695" y="269" text-anchor="middle" fill="#94a3b8" font-size="10">SLA metrics</text>

  <line x1="570" y1="225" x2="620" y2="225" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>

  <!-- Redis -->
  <rect x="440" y="310" width="130" height="60" rx="8" fill="#0a0a20" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="505" y="340" text-anchor="middle" fill="#e2e8f0" font-size="13">Redis</text>
  <text x="505" y="358" text-anchor="middle" fill="#f59e0b" font-size="10">Result cache</text>

  <line x1="505" y1="270" x2="505" y2="310" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.5"/>
</svg>
