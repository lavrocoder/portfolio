<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420"
     style="background:#0d0d1a; font-family: 'Inter', sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488" opacity="0.75"/>
    </marker>
    <marker id="arr-up" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488" opacity="0.55"/>
    </marker>
  </defs>

  <!-- ── Box 1: Внешние сайты (left) ── -->
  <rect x="40" y="160" width="160" height="90" fill="#0f1f30" stroke="#0d9488" stroke-width="1.5" rx="8"/>
  <text x="120" y="198" fill="#e2e8f0" font-size="13" text-anchor="middle">Внешние сайты</text>
  <text x="120" y="215" fill="#94a3b8" font-size="10" text-anchor="middle">HTML-страницы</text>
  <text x="120" y="230" fill="#0d9488" font-size="10" text-anchor="middle">HTTP</text>
  <text x="120" y="244" fill="#64748b" font-size="9" text-anchor="middle">requests.get(url)</text>

  <!-- Arrow 1: sites → scraper -->
  <line x1="202" y1="205" x2="334" y2="205" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="268" y="198" fill="#94a3b8" font-size="9" text-anchor="middle">HTTP requests</text>
  <text x="268" y="218" fill="#64748b" font-size="8" text-anchor="middle">HTML response</text>

  <!-- ── Box 2: Python Scraper / main.py (center, main) ── -->
  <rect x="336" y="140" width="190" height="130" fill="#0f1f30" stroke="#0d9488" stroke-width="2" rx="8"/>
  <text x="431" y="173" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="bold">Python Scraper</text>
  <text x="431" y="189" fill="#94a3b8" font-size="10" text-anchor="middle">main.py</text>
  <line x1="352" y1="196" x2="510" y2="196" stroke="#0d9488" stroke-width="0.5" opacity="0.3"/>
  <text x="431" y="212" fill="#0d9488" font-size="10" text-anchor="middle">requests + BeautifulSoup</text>
  <text x="431" y="228" fill="#94a3b8" font-size="9" text-anchor="middle">Парсинг HTML-разметки</text>
  <text x="431" y="248" fill="#0d9488" font-size="10" text-anchor="middle">psycopg2</text>
  <text x="431" y="263" fill="#94a3b8" font-size="9" text-anchor="middle">Запись данных в БД</text>

  <!-- Arrow 2: scraper → postgres -->
  <line x1="528" y1="205" x2="656" y2="205" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="592" y="198" fill="#94a3b8" font-size="9" text-anchor="middle">INSERT / SELECT</text>
  <text x="592" y="218" fill="#64748b" font-size="8" text-anchor="middle">psycopg2</text>

  <!-- ── Box 3: PostgreSQL (right) ── -->
  <rect x="658" y="160" width="190" height="90" fill="#0f1f30" stroke="#0d9488" stroke-width="1.5" rx="8"/>
  <text x="753" y="198" fill="#e2e8f0" font-size="13" text-anchor="middle">PostgreSQL</text>
  <text x="753" y="215" fill="#94a3b8" font-size="10" text-anchor="middle">База данных</text>
  <text x="753" y="232" fill="#0d9488" font-size="10" text-anchor="middle">Таблицы данных</text>
  <text x="753" y="246" fill="#64748b" font-size="9" text-anchor="middle">psycopg2-binary</text>

  <!-- ── Box 4: config.py (below scraper) ── -->
  <rect x="366" y="320" width="130" height="60" fill="#0f1f30" stroke="#0d9488" stroke-width="1" rx="8" stroke-dasharray="5,3"/>
  <text x="431" y="346" fill="#e2e8f0" font-size="12" text-anchor="middle">config.py</text>
  <text x="431" y="362" fill="#0d9488" font-size="10" text-anchor="middle">DB_CONFIG</text>
  <text x="431" y="374" fill="#64748b" font-size="9" text-anchor="middle">host / port / db / user</text>

  <!-- Arrow 3: config.py → scraper (dashed, upward) -->
  <line x1="431" y1="318" x2="431" y2="272" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-up)" opacity="0.55"/>
  <text x="470" y="300" fill="#64748b" font-size="9" text-anchor="middle">credentials</text>

  <!-- ── requirements.txt note (bottom-left) ── -->
  <rect x="40" y="310" width="145" height="55" fill="#0f1f30" stroke="#64748b" stroke-width="1" rx="6" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="112" y="333" fill="#94a3b8" font-size="11" text-anchor="middle">requirements.txt</text>
  <text x="112" y="349" fill="#64748b" font-size="9" text-anchor="middle">requests, bs4</text>
  <text x="112" y="361" fill="#64748b" font-size="9" text-anchor="middle">psycopg2-binary</text>

  <!-- Connector: requirements hint to scraper (subtle dashed) -->
  <line x1="185" y1="338" x2="334" y2="270" stroke="#64748b" stroke-width="1" stroke-dasharray="4,4" opacity="0.35"/>
</svg>
