<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2744"/>
      <stop offset="100%" stop-color="#051020"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <g stroke="#22d3ee" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="420" x2="800" y2="420"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="0" y1="540" x2="800" y2="540"/>
    <line x1="80" y1="0" x2="80" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="600"/>
    <line x1="240" y1="0" x2="240" y2="600"/>
    <line x1="320" y1="0" x2="320" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/>
    <line x1="560" y1="0" x2="560" y2="600"/>
    <line x1="640" y1="0" x2="640" y2="600"/>
    <line x1="720" y1="0" x2="720" y2="600"/>
  </g>

  <!-- Title -->
  <text x="60" y="65" font-family="'Inter', monospace" font-size="20" font-weight="600" fill="#22d3ee" opacity="0.95">Архитектурная консультация</text>
  <text x="60" y="90" font-family="'Inter', monospace" font-size="12" fill="#94a3b8">Telegram Bot · Python · PostgreSQL · проектирование структуры</text>

  <!-- Central arch diagram: simplified bot architecture -->

  <!-- User block (left) -->
  <rect x="60" y="145" width="120" height="65" rx="8" fill="url(#cardGrad)" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="120" y="172" font-family="monospace" font-size="11" fill="#e2e8f0" text-anchor="middle" font-weight="600">Пользователь</text>
  <text x="120" y="190" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Telegram App</text>

  <!-- Arrow User → Bot -->
  <line x1="180" y1="177" x2="248" y2="177" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr-cyan)" opacity="0.7"/>
  <text x="214" y="170" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">сообщения</text>

  <!-- Bot core (center) -->
  <rect x="250" y="128" width="160" height="100" rx="8" fill="#0a1f30" stroke="#22d3ee" stroke-width="2"/>
  <text x="330" y="158" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="700">Telegram Bot</text>
  <text x="330" y="175" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle">aiogram / Python</text>
  <text x="330" y="192" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">FSM · handlers</text>
  <text x="330" y="207" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">webhook / polling</text>

  <!-- Arrow Bot → DB -->
  <line x1="410" y1="177" x2="478" y2="177" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr-indigo)" opacity="0.7"/>
  <text x="444" y="170" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">CRUD</text>

  <!-- Database (right) -->
  <rect x="480" y="140" width="135" height="75" rx="8" fill="url(#cardGrad)" stroke="#6366f1" stroke-width="1.2"/>
  <text x="547" y="168" font-family="monospace" font-size="11" fill="#e2e8f0" text-anchor="middle" font-weight="600">PostgreSQL</text>
  <text x="547" y="185" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">users · sessions</text>
  <text x="547" y="200" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">FSM states · data</text>

  <!-- Arrow Bot → Telegram API -->
  <line x1="330" y1="228" x2="330" y2="280" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Telegram Bot API block (bottom center) -->
  <rect x="250" y="282" width="160" height="60" rx="8" fill="url(#cardGrad)" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <text x="330" y="308" font-family="monospace" font-size="11" fill="#e2e8f0" text-anchor="middle" font-weight="600">Telegram Bot API</text>
  <text x="330" y="326" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">sendMessage · callback · inline</text>

  <!-- Arrow markers defs inside SVG -->
  <defs>
    <marker id="arr-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" opacity="0.7"/>
    </marker>
    <marker id="arr-indigo" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Topics discussed panel (right side) -->
  <rect x="650" y="128" width="120" height="215" rx="8" fill="#0a1520" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3"/>
  <text x="710" y="152" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle">Темы созвона</text>
  <line x1="665" y1="160" x2="755" y2="160" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
  <text x="665" y="180" font-family="monospace" font-size="9" fill="#94a3b8">01 · Стек</text>
  <text x="665" y="196" font-family="monospace" font-size="8" fill="#64748b">Python + aiogram</text>
  <line x1="665" y1="206" x2="755" y2="206" stroke="#22d3ee" stroke-width="0.3" opacity="0.2"/>
  <text x="665" y="224" font-family="monospace" font-size="9" fill="#94a3b8">02 · База данных</text>
  <text x="665" y="240" font-family="monospace" font-size="8" fill="#64748b">структура таблиц</text>
  <text x="665" y="254" font-family="monospace" font-size="8" fill="#64748b">FSM states · users</text>
  <line x1="665" y1="264" x2="755" y2="264" stroke="#22d3ee" stroke-width="0.3" opacity="0.2"/>
  <text x="665" y="282" font-family="monospace" font-size="9" fill="#94a3b8">03 · API методы</text>
  <text x="665" y="298" font-family="monospace" font-size="8" fill="#64748b">webhook / polling</text>
  <text x="665" y="312" font-family="monospace" font-size="8" fill="#64748b">callback · inline kb</text>
  <line x1="665" y1="322" x2="755" y2="322" stroke="#22d3ee" stroke-width="0.3" opacity="0.2"/>
  <text x="710" y="336" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle">✓ ТЗ составлено</text>

  <!-- Format badge -->
  <rect x="60" y="380" width="555" height="55" rx="8" fill="#0a1520" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.25"/>
  <text x="80" y="402" font-family="monospace" font-size="10" fill="#94a3b8">Формат:</text>
  <rect x="130" y="388" width="80" height="22" rx="4" fill="#22d3ee" fill-opacity="0.1" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="170" y="403" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle">Созвон 1.5 ч</text>
  <rect x="220" y="388" width="78" height="22" rx="4" fill="#22d3ee" fill-opacity="0.1" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="259" y="403" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle">3 темы разбора</text>
  <rect x="308" y="388" width="90" height="22" rx="4" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="353" y="403" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle">Готовое ТЗ на выходе</text>
  <text x="80" y="426" font-family="monospace" font-size="9" fill="#64748b">Результат: заказчик получил архитектурную концепцию и смог самостоятельно написать ТЗ</text>

  <!-- Particles -->
  <circle cx="752" cy="100" r="3" fill="#22d3ee" opacity="0.25"/>
  <circle cx="28" cy="310" r="5" fill="#22d3ee" opacity="0.1"/>
  <circle cx="780" cy="460" r="4" fill="#22d3ee" opacity="0.15"/>
  <circle cx="40" cy="175" r="3" fill="#22d3ee" opacity="0.2"/>
  <circle cx="770" cy="530" r="6" fill="#22d3ee" opacity="0.07"/>

  <!-- Corner accent -->
  <line x1="742" y1="38" x2="782" y2="38" stroke="#22d3ee" stroke-width="1.5" opacity="0.3"/>
  <line x1="782" y1="38" x2="782" y2="68" stroke="#22d3ee" stroke-width="1.5" opacity="0.3"/>
</svg>
