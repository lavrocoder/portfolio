<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e0f44"/>
      <stop offset="100%" stop-color="#0c0720"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#7c3aed" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="75" x2="800" y2="75"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/><line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- Phone mockup -->
  <rect x="280" y="80" width="240" height="440" rx="24" fill="#0d0720" stroke="#7c3aed" stroke-width="2" opacity="0.9"/>
  <rect x="295" y="100" width="210" height="400" rx="16" fill="#12082c" opacity="0.95"/>
  <!-- Screen header -->
  <rect x="295" y="100" width="210" height="50" rx="8" fill="#1a0a3a"/>
  <text x="400" y="132" text-anchor="middle" fill="#a78bfa" font-size="14" font-family="sans-serif" font-weight="600">🛍️ Магазин</text>
  <!-- Product cards -->
  <rect x="305" y="162" width="90" height="110" rx="8" fill="#1a0a3a" stroke="#7c3aed" stroke-width="0.5"/>
  <rect x="315" y="172" width="70" height="60" rx="6" fill="#2d1060" opacity="0.8"/>
  <rect x="315" y="242" width="70" height="8" rx="4" fill="#a78bfa" opacity="0.6"/>
  <rect x="315" y="258" width="50" height="6" rx="3" fill="#7c3aed" opacity="0.5"/>
  <rect x="405" y="162" width="90" height="110" rx="8" fill="#1a0a3a" stroke="#7c3aed" stroke-width="0.5"/>
  <rect x="415" y="172" width="70" height="60" rx="6" fill="#2d1060" opacity="0.8"/>
  <rect x="415" y="242" width="70" height="8" rx="4" fill="#a78bfa" opacity="0.6"/>
  <rect x="415" y="258" width="50" height="6" rx="3" fill="#7c3aed" opacity="0.5"/>
  <!-- Cart button -->
  <rect x="305" y="290" width="190" height="40" rx="20" fill="#7c3aed"/>
  <text x="400" y="315" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif" font-weight="600">В корзину</text>
  <!-- Payment step -->
  <rect x="305" y="345" width="190" height="60" rx="8" fill="#1a0a3a" stroke="#10b981" stroke-width="0.8"/>
  <text x="400" y="371" text-anchor="middle" fill="#34d399" font-size="11" font-family="sans-serif">✅ Оплата прошла</text>
  <text x="400" y="391" text-anchor="middle" fill="#6b7280" font-size="10" font-family="sans-serif">ЮKassa #28491</text>
  <!-- Floating elements -->
  <circle cx="150" cy="200" r="40" fill="#1a0a3a" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
  <text x="150" y="208" text-anchor="middle" font-size="24">🛒</text>
  <circle cx="650" cy="380" r="35" fill="#1a0a3a" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
  <text x="650" y="388" text-anchor="middle" font-size="22">💳</text>
  <circle cx="130" cy="420" r="3" fill="#7c3aed" opacity="0.5"/>
  <circle cx="680" cy="150" r="4" fill="#7c3aed" opacity="0.4"/>
</svg>
