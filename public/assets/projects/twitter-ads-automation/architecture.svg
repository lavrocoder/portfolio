<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420"
     style="background:#0d0d1a; font-family: 'Inter', sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#0d0d1a"/>

  <!-- Title -->
  <text x="450" y="36" fill="#94a3b8" font-size="13" text-anchor="middle">Архитектура: Twitter RPA Automation</text>

  <!-- === Block 1: Маркетолог === -->
  <rect x="20" y="155" width="120" height="80" rx="8" fill="#0f1f30" stroke="#6366f1" stroke-width="1.5"/>
  <text x="80" y="187" fill="#e2e8f0" font-size="13" text-anchor="middle">Маркетолог</text>
  <text x="80" y="204" fill="#94a3b8" font-size="10" text-anchor="middle">SMM-специалист</text>
  <text x="80" y="220" fill="#818cf8" font-size="10" text-anchor="middle">браузер ADS</text>

  <!-- Arrow 1 → 2 -->
  <line x1="140" y1="195" x2="178" y2="195" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- === Block 2: AdsPower RPA === -->
  <rect x="180" y="145" width="155" height="100" rx="8" fill="#0f1f30" stroke="#6366f1" stroke-width="2"/>
  <text x="257" y="178" fill="#e2e8f0" font-size="13" text-anchor="middle">AdsPower</text>
  <text x="257" y="195" fill="#e2e8f0" font-size="13" text-anchor="middle">RPA Browser</text>
  <text x="257" y="214" fill="#94a3b8" font-size="10" text-anchor="middle">RPA-конструктор</text>
  <text x="257" y="230" fill="#818cf8" font-size="10" text-anchor="middle">JS execute block</text>

  <!-- Arrow 2 → 3 -->
  <line x1="335" y1="195" x2="378" y2="195" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="356" y="188" fill="#6b7280" font-size="9" text-anchor="middle">run script</text>

  <!-- === Block 3: JS Scripts (3 boxes) === -->
  <!-- Container -->
  <rect x="380" y="130" width="185" height="130" rx="8" fill="#080818" stroke="#6366f1" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="472" y="150" fill="#6366f1" font-size="10" text-anchor="middle">JS Скрипты</text>

  <!-- Like script -->
  <rect x="392" y="157" width="55" height="36" rx="5" fill="#0f1f30" stroke="#f472b6" stroke-width="1"/>
  <text x="419" y="173" fill="#f472b6" font-size="9" text-anchor="middle">♥ Like</text>
  <text x="419" y="185" fill="#6b7280" font-size="8" text-anchor="middle">like.js</text>

  <!-- Retweet script -->
  <rect x="455" y="157" width="55" height="36" rx="5" fill="#0f1f30" stroke="#38bdf8" stroke-width="1"/>
  <text x="482" y="173" fill="#38bdf8" font-size="9" text-anchor="middle">↺ RT</text>
  <text x="482" y="185" fill="#6b7280" font-size="8" text-anchor="middle">retweet.js</text>

  <!-- Follow script -->
  <rect x="518" y="157" width="38" height="36" rx="5" fill="#0f1f30" stroke="#86efac" stroke-width="1"/>
  <text x="537" y="173" fill="#86efac" font-size="9" text-anchor="middle">+</text>
  <text x="537" y="185" fill="#6b7280" font-size="8" text-anchor="middle">follow.js</text>

  <!-- Check state label -->
  <text x="472" y="218" fill="#374151" font-size="9" text-anchor="middle">check state → act or skip</text>
  <text x="472" y="230" fill="#6366f1" font-size="9" text-anchor="middle">идемпотентное выполнение</text>
  <text x="472" y="244" fill="#374151" font-size="9" text-anchor="middle">CSS / XPath selectors</text>

  <!-- Arrow 3 → 4 -->
  <line x1="565" y1="195" x2="604" y2="195" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="584" y="188" fill="#6b7280" font-size="9" text-anchor="middle">DOM</text>

  <!-- === Block 4: Twitter Web === -->
  <rect x="606" y="155" width="150" height="80" rx="8" fill="#0f1f30" stroke="#6366f1" stroke-width="1.5"/>
  <text x="681" y="183" fill="#e2e8f0" font-size="13" text-anchor="middle">Twitter Web</text>
  <text x="681" y="200" fill="#94a3b8" font-size="10" text-anchor="middle">интерфейс в браузере</text>
  <text x="681" y="217" fill="#818cf8" font-size="10" text-anchor="middle">aria-label attrs</text>

  <!-- Arrow 4 → 5 -->
  <line x1="756" y1="195" x2="795" y2="195" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- === Block 5: Actions === -->
  <rect x="797" y="140" width="90" height="110" rx="8" fill="#0f1f30" stroke="#6366f1" stroke-width="1.5"/>
  <text x="842" y="163" fill="#94a3b8" font-size="10" text-anchor="middle">Действие</text>
  <text x="842" y="180" fill="#f472b6" font-size="11" text-anchor="middle">♥ liked</text>
  <text x="842" y="197" fill="#38bdf8" font-size="11" text-anchor="middle">↺ retweeted</text>
  <text x="842" y="214" fill="#86efac" font-size="11" text-anchor="middle">✦ followed</text>
  <text x="842" y="232" fill="#27c93f" font-size="10" text-anchor="middle">or skipped</text>

  <!-- Bottom annotations -->
  <text x="257" y="310" fill="#374151" font-size="10" text-anchor="middle">мультипрофильный</text>
  <text x="257" y="323" fill="#374151" font-size="10" text-anchor="middle">браузер</text>

  <text x="472" y="310" fill="#374151" font-size="10" text-anchor="middle">проверка состояния</text>
  <text x="472" y="323" fill="#374151" font-size="10" text-anchor="middle">перед каждым действием</text>

  <text x="681" y="310" fill="#374151" font-size="10" text-anchor="middle">querySelector /</text>
  <text x="681" y="323" fill="#374151" font-size="10" text-anchor="middle">XPath evaluate</text>

  <!-- Decorative dots -->
  <circle cx="20" cy="60" r="3" fill="#6366f1" opacity="0.2"/>
  <circle cx="880" cy="60" r="3" fill="#6366f1" opacity="0.2"/>
  <circle cx="20" cy="390" r="3" fill="#6366f1" opacity="0.2"/>
  <circle cx="880" cy="390" r="3" fill="#6366f1" opacity="0.2"/>
</svg>
